<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OceanShark Xray Manager</title>
<style>
:root{
  --bg:#0b1120; --bg2:#0f172a; --panel:#141d30; --panel2:#1a2436;
  --border:#243247; --border2:#2d3d54;
  --text:#e6ecf5; --muted:#8698b3; --faint:#5b6b85;
  --brand:#06b6d4; --brand2:#0891b2; --brandglow:rgba(6,182,212,.15);
  --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; --info:#3b82f6;
  --radius:14px; --radius-sm:9px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%, #10233a 0%, transparent 60%),
             radial-gradient(900px 500px at -10% 110%, #0d2130 0%, transparent 55%), var(--bg);
  color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{
  width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:34px 30px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.logo .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--brand),#0369a1);font-size:20px}
.logo h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
.login-card .sub{color:var(--muted);font-size:13px;margin:4px 0 24px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:500}
.input,select.input,textarea.input{
  width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:11px 13px;font-size:14px;outline:none;transition:.15s}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandglow)}
.btn{
  border:1px solid transparent;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;
  font-weight:600;background:var(--panel2);color:var(--text);transition:.15s;display:inline-flex;
  align-items:center;gap:7px;justify-content:center}
.btn:hover{filter:brightness(1.12)}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04222b}
.btn.ok{background:var(--ok);color:#052e14}
.btn.danger{background:transparent;border-color:var(--danger);color:#fca5a5}
.btn.danger:hover{background:rgba(239,68,68,.12)}
.btn.ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
.btn.sm{padding:6px 10px;font-size:12.5px}
.btn.block{width:100%}
.err{color:#fca5a5;font-size:13px;margin-top:10px;min-height:18px}

/* ---------- App shell ---------- */
#app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
aside{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
  border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column}
aside .logo{padding:6px 8px 20px}
nav{display:flex;flex-direction:column;gap:4px;flex:1}
nav .item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;
  color:var(--muted);font-size:14px;font-weight:500;transition:.15s;border:1px solid transparent}
nav .item:hover{background:var(--panel2);color:var(--text)}
nav .item.active{background:var(--brandglow);color:var(--brand);border-color:rgba(6,182,212,.25)}
nav .item .ic{width:18px;text-align:center;font-size:16px}
aside .foot{font-size:11.5px;color:var(--faint);padding:12px 10px 2px;border-top:1px solid var(--border);margin-top:8px}

main{padding:26px 30px;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.topbar h2{margin:0;font-size:21px;font-weight:700}
.topbar .right{display:flex;align-items:center;gap:12px}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;
  font-size:12.5px;font-weight:600;background:var(--panel);border:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.off{background:var(--danger)}

/* ---------- Cards / stats ---------- */
.grid{display:grid;gap:16px}
.stats{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat .label{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:8px}
.stat .val{font-size:26px;font-weight:750;margin-top:8px;letter-spacing:-.5px}
.stat .val small{font-size:13px;color:var(--muted);font-weight:500}
.stat .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;
  background:var(--brandglow);color:var(--brand)}

/* ---------- Table ---------- */
.panelbox{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panelbox .head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
.panelbox .head h3{margin:0;font-size:15px;font-weight:650}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
th{text-align:left;padding:12px 16px;color:var(--muted);font-weight:600;font-size:11.5px;
  text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);white-space:nowrap}
td{padding:13px 16px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;
  font-weight:600;background:var(--panel2);border:1px solid var(--border2)}
.tag.vless{color:#38bdf8}.tag.vmess{color:#c084fc}.tag.trojan{color:#fb7185}
.tag.shadowsocks{color:#34d399}.tag.wireguard{color:#fbbf24}.tag.socks,.tag.http{color:#94a3b8}
.tag.dokodemo-door{color:#a3a3a3}
.badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.on{background:rgba(34,197,94,.14);color:#4ade80}
.badge.off{background:rgba(239,68,68,.14);color:#f87171}
.badge.exp{background:rgba(245,158,11,.14);color:#fbbf24}
.online-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.online-dot.y{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.online-dot.n{background:var(--faint)}
.usebar{height:6px;border-radius:4px;background:var(--bg2);overflow:hidden;margin-top:5px;min-width:90px}
.usebar > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#22d3ee)}
.usebar > i.hi{background:linear-gradient(90deg,var(--warn),var(--danger))}
.rowacts{display:flex;gap:6px;flex-wrap:wrap}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--panel2);
  color:var(--muted);display:grid;place-items:center;font-size:14px;transition:.15s}
.iconbtn:hover{color:var(--text);border-color:var(--brand)}
.iconbtn.danger:hover{color:#fca5a5;border-color:var(--danger)}
.empty{padding:44px;text-align:center;color:var(--muted);font-size:14px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,10,20,.66);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);
  width:100%;max-width:520px;box-shadow:var(--shadow);animation:pop .16s ease}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal .mhead{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal .mhead h3{margin:0;font-size:16px}
.modal .mbody{padding:20px 22px;max-height:66vh;overflow-y:auto}
.modal .mfoot{padding:15px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.hint{font-size:11.5px;color:var(--faint);margin-top:5px}
.close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1}

/* share link box */
.linkbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all;color:#a5f3fc;
  white-space:pre-wrap;max-height:180px;overflow:auto}
.qrwrap{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:var(--radius-sm);margin-top:14px}
.qrwrap img,.qrwrap svg{width:210px;height:210px}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:100}
.toast{background:var(--panel2);border:1px solid var(--border2);border-left:3px solid var(--brand);
  padding:12px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);min-width:220px;animation:pop .16s}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--danger)}

@media(max-width:820px){
  #app{grid-template-columns:1fr}
  aside{position:fixed;z-index:40;left:-260px;width:230px;transition:.2s;box-shadow:var(--shadow)}
  aside.show{left:0}
  main{padding:18px 16px}
  .menutoggle{display:grid!important}
}
.menutoggle{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--panel);color:var(--text);place-items:center;font-size:18px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="logo"><div class="mark">🦈</div><h1>OceanShark</h1></div>
    <div class="sub">Xray Manager — masuk untuk mengelola server</div>
    <div class="field"><label>Username</label><input class="input" id="lu" autocomplete="username" required></div>
    <div class="field"><label>Password</label><input class="input" id="lp" type="password" autocomplete="current-password" required></div>
    <button class="btn primary block" type="submit">Masuk</button>
    <div class="err" id="lerr"></div>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <aside id="side">
    <div class="logo"><div class="mark">🦈</div><h1>OceanShark</h1></div>
    <nav>
      <a class="item active" data-page="dash"><span class="ic">▤</span> Dashboard</a>
      <a class="item" data-page="inbounds"><span class="ic">↧</span> Inbounds</a>
      <a class="item" data-page="clients"><span class="ic">☺</span> Clients</a>
      <a class="item" data-page="certs"><span class="ic">🔒</span> Sertifikat</a>
      <a class="item" data-page="settings"><span class="ic">⚙</span> Pengaturan</a>
    </nav>
    <div class="foot">v{{VERSION}} · <a href="#" onclick="doLogout();return false">Keluar</a></div>
  </aside>

  <main>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menutoggle" onclick="document.getElementById('side').classList.toggle('show')">☰</button>
        <h2 id="ptitle">Dashboard</h2>
      </div>
      <div class="right">
        <span class="pill"><span class="dot" id="xdot"></span><span id="xstate">…</span></span>
        <button class="btn ghost sm" onclick="refresh()">↻ Refresh</button>
      </div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
const BASE = "{{BASE}}";
const API = BASE + "/panel/api";
let STATE = {inbounds:[], clients:[], settings:null, status:null, certs:[]};

// ---------- helpers ----------
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg,kind){const t=el(`<div class="toast ${kind||''}">${esc(msg)}</div>`);document.getElementById('toast').appendChild(t);setTimeout(()=>t.remove(),3200);}
function fmtBytes(n){n=Number(n||0);if(!n)return '0 B';const u=['B','KB','MB','GB','TB'];let i=0;while(Math.abs(n)>=1024&&i<u.length-1){n/=1024;i++;}return (i?n.toFixed(1):n)+' '+u[i];}
function fmtExpiry(ms){ms=Number(ms||0);if(ms===0)return {t:'Selamanya',c:''};if(ms<0)return {t:(Math.abs(ms)/86400000|0)+'h saat dipakai',c:''};const d=new Date(ms);const exp=ms<Date.now();return {t:d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}),c:exp?'exp':''};}
function daysLeft(ms){if(!ms||ms<0)return null;return Math.ceil((ms-Date.now())/86400000);}

async function api(method,path,body){
  const opt={method,headers:{},credentials:'same-origin'};
  if(body!==undefined){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(body);}
  const r=await fetch(API+path,opt);
  if(r.status===401){showLogin();throw new Error('Sesi berakhir, silakan login.');}
  const ct=r.headers.get('content-type')||'';
  if(ct.includes('json')){const j=await r.json();if(!j.success)throw new Error(j.msg||'Gagal');return j.obj;}
  return await r.text();
}

// ---------- auth ----------
async function doLogin(e){
  e.preventDefault();
  const err=document.getElementById('lerr');err.textContent='';
  try{
    const r=await fetch(BASE+'/login',{method:'POST',headers:{'Content-Type':'application/json'},
      credentials:'same-origin',body:JSON.stringify({username:lu.value,password:lp.value})});
    const j=await r.json();
    if(!j.success){err.textContent=j.msg||'Login gagal';return;}
    showApp();
  }catch(x){err.textContent='Tidak bisa terhubung ke server.';}
}
async function doLogout(){try{await fetch(BASE+'/logout',{credentials:'same-origin'});}catch(x){}showLogin();}
function showLogin(){document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');refresh();}

// ---------- data ----------
async function refresh(){
  try{
    const [status,inboundsRaw,clients,settings,certs]=await Promise.all([
      api('GET','/server/status'),api('GET','/inbounds/list'),api('GET','/clients/list'),
      api('GET','/settings'),api('GET','/certs')]);
    const inbounds = (inboundsRaw || []).map(ib => ({
      ...ib,
      settings: typeof ib.settings === 'string' ? JSON.parse(ib.settings) : (ib.settings || {}),
      streamSettings: typeof ib.streamSettings === 'string' ? JSON.parse(ib.streamSettings) : (ib.streamSettings || {}),
      sniffing: typeof ib.sniffing === 'string' ? JSON.parse(ib.sniffing) : (ib.sniffing || {})
    }));
    STATE={status,inbounds,clients,settings,certs};
    paintStatus();render();
  }catch(x){if(x.message.includes('Sesi'))return;toast(x.message,'err');}
}
function paintStatus(){
  const s=STATE.status||{};const xr=(s.xray||{});
  const on=xr.state==='running';
  document.getElementById('xdot').className='dot '+(on?'on':'off');
  document.getElementById('xstate').textContent='Xray '+(on?'aktif':'mati')+(xr.version?' · '+xr.version.split(' ')[1]||'':'');
}

// ---------- routing ----------
let PAGE='dash';
const TITLES={dash:'Dashboard',inbounds:'Inbounds',clients:'Clients',certs:'Sertifikat TLS',settings:'Pengaturan'};
document.querySelectorAll('nav .item').forEach(a=>a.onclick=()=>{
  PAGE=a.dataset.page;
  document.querySelectorAll('nav .item').forEach(x=>x.classList.toggle('active',x===a));
  document.getElementById('ptitle').textContent=TITLES[PAGE];
  document.getElementById('side').classList.remove('show');
  render();
});
function render(){({dash:renderDash,inbounds:renderInbounds,clients:renderClients,certs:renderCerts,settings:renderSettings}[PAGE])();}

// ---------- Dashboard ----------
function renderDash(){
  const s=STATE.status||{};const xr=s.xray||{};const mem=s.mem||{};
  const online=STATE.clients.filter(c=>c.online).length;
  const memPct=mem.total?Math.round(mem.current/mem.total*100):0;
  const up=s.uptime?(s.uptime/86400).toFixed(1)+' hari':'—';
  const cards=[
    ['Status Xray',(xr.state==='running'?'Aktif':'Mati'),xr.version||'',(xr.state==='running'?'🟢':'🔴')],
    ['Total Inbound',STATE.inbounds.length,'',''+'↧'],
    ['Total Client',STATE.clients.length,online+' online','☺'],
    ['Memori',memPct+'%',fmtBytes(mem.current)+' / '+fmtBytes(mem.total),'▦'],
    ['CPU Load',(s.cpu??0).toFixed(2),'','◈'],
    ['Uptime',up,'','⏱'],
  ];
  document.getElementById('view').innerHTML=`
    <div class="grid stats">${cards.map(c=>`
      <div class="card stat"><div class="label"><span class="ic">${c[3]}</span>${c[0]}</div>
      <div class="val">${esc(c[1])} ${c[2]?`<small>${esc(c[2])}</small>`:''}</div></div>`).join('')}
    </div>
    <div class="panelbox"><div class="head"><h3>Client segera berakhir</h3>
      <button class="btn primary sm" onclick="modalAddClient()">+ Client</button></div>
      ${expiringTable()}</div>`;
}
function expiringTable(){
  const soon=STATE.clients.map(c=>({...c,dl:daysLeft(c.expiryTime)}))
    .filter(c=>c.dl!==null&&c.dl<=7).sort((a,b)=>a.dl-b.dl).slice(0,8);
  if(!soon.length)return `<div class="empty">Tidak ada client yang akan berakhir dalam 7 hari 🎉</div>`;
  return `<div class="tablewrap"><table><thead><tr><th>Email</th><th>Sisa</th><th>Kuota</th><th>Status</th></tr></thead>
  <tbody>${soon.map(c=>{const u=c.traffic.usage,t=c.totalGB;return `<tr>
    <td>${esc(c.email)}</td>
    <td><span class="badge ${c.dl<0?'off':'exp'}">${c.dl<0?'Expired':c.dl+' hari'}</span></td>
    <td>${t?fmtBytes(u)+' / '+fmtBytes(t):'∞'}</td>
    <td><span class="badge ${c.enable?'on':'off'}">${c.enable?'Aktif':'Nonaktif'}</span></td></tr>`;}).join('')}</tbody></table></div>`;
}

// ---------- Inbounds ----------
function renderInbounds(){
  const rows=STATE.inbounds;
  document.getElementById('view').innerHTML=`
    <div class="panelbox"><div class="head"><h3>${rows.length} Inbound</h3>
      <button class="btn primary sm" onclick="modalAddInbound()">+ Tambah Inbound</button></div>
      ${!rows.length?`<div class="empty">Belum ada inbound. Klik “Tambah Inbound”.</div>`:`
      <div class="tablewrap"><table><thead><tr>
        <th>Remark</th><th>Protokol</th><th>Port</th><th>Transport</th><th>Trafik</th><th>Client</th><th>Status</th><th></th>
      </tr></thead><tbody>${rows.map(inbRow).join('')}</tbody></table></div>`}</div>`;
}
function inbRow(ib){
  const ss=ib.streamSettings||{};const net=ss.network||'-';const sec=ss.security||'none';
  const nc=(ib.settings&&(ib.settings.clients||ib.settings.peers)||[]).length;
  return `<tr>
    <td><b>${esc(ib.remark)}</b><div class="hint">${esc(ib.tag)}</div></td>
    <td><span class="tag ${esc(ib.protocol)}">${esc(ib.protocol)}</span></td>
    <td>${ib.port}</td>
    <td>${esc(net)}${sec!=='none'?` · <span style="color:var(--brand)">${esc(sec)}</span>`:''}</td>
    <td>↑${fmtBytes(ib.up)} ↓${fmtBytes(ib.down)}</td>
    <td>${nc}</td>
    <td><span class="badge ${ib.enable?'on':'off'}">${ib.enable?'Aktif':'Nonaktif'}</span></td>
    <td><div class="rowacts">
      <button class="iconbtn" title="${ib.enable?'Nonaktifkan':'Aktifkan'}" onclick="toggleInbound(${ib.id},${ib.enable?0:1})">${ib.enable?'⏸':'▶'}</button>
      <button class="iconbtn" title="Reset trafik" onclick="resetInbound(${ib.id})">↺</button>
      <button class="iconbtn danger" title="Hapus" onclick="delInbound(${ib.id},'${esc(ib.remark)}')">🗑</button>
    </div></td></tr>`;
}
async function toggleInbound(id,en){try{await api('POST','/inbounds/update/'+id,{enable:en});toast('Inbound diperbarui','ok');refresh();}catch(x){toast(x.message,'err');}}
async function resetInbound(id){if(!confirm('Reset trafik inbound ini (termasuk client)?'))return;try{await api('POST','/inbounds/resetTraffic/'+id);toast('Trafik direset','ok');refresh();}catch(x){toast(x.message,'err');}}
async function delInbound(id,name){if(!confirm('Hapus inbound "'+name+'" beserta semua client-nya?'))return;try{await api('POST','/inbounds/del/'+id);toast('Inbound dihapus','ok');refresh();}catch(x){toast(x.message,'err');}}

// ---------- Clients ----------
function renderClients(){
  const rows=STATE.clients;
  const byId={};STATE.inbounds.forEach(i=>byId[i.id]=i);
  document.getElementById('view').innerHTML=`
    <div class="panelbox"><div class="head"><h3>${rows.length} Client</h3>
      <button class="btn primary sm" onclick="modalAddClient()">+ Tambah Client</button></div>
      ${!rows.length?`<div class="empty">Belum ada client.</div>`:`
      <div class="tablewrap"><table><thead><tr>
        <th>Email</th><th>Inbound</th><th>Pemakaian</th><th>Limit IP</th><th>Kadaluarsa</th><th>Online</th><th>Status</th><th></th>
      </tr></thead><tbody>${rows.map(c=>cliRow(c,byId)).join('')}</tbody></table></div>`}</div>`;
}
function cliRow(c,byId){
  const ib=byId[c.inboundIds&&c.inboundIds[0]]||{};
  const u=c.traffic.usage,t=c.totalGB;const pct=t?Math.min(100,u/t*100):0;
  const ex=fmtExpiry(c.expiryTime);
  return `<tr>
    <td><b>${esc(c.email)}</b></td>
    <td><span class="tag ${esc(ib.protocol||'')}">${esc(ib.remark||('#'+(c.inboundIds&&c.inboundIds[0]||'')))}</span></td>
    <td>${fmtBytes(u)}${t?' / '+fmtBytes(t):' / ∞'}
        ${t?`<div class="usebar"><i class="${pct>85?'hi':''}" style="width:${pct}%"></i></div>`:''}</td>
    <td>${c.limitIp||'∞'}</td>
    <td><span class="badge ${ex.c||'on'}">${ex.t}</span></td>
    <td><span class="online-dot ${c.online?'y':'n'}"></span></td>
    <td><span class="badge ${c.enable?'on':'off'}">${c.enable?'Aktif':'Nonaktif'}</span></td>
    <td><div class="rowacts">
      <button class="iconbtn" title="Link & QR" onclick="modalShare('${esc(c.email)}')">🔗</button>
      <button class="iconbtn" title="Edit" onclick="modalEditClient('${esc(c.email)}')">✎</button>
      <button class="iconbtn" title="${c.enable?'Nonaktifkan':'Aktifkan'}" onclick="toggleClient('${esc(c.email)}',${c.enable?0:1})">${c.enable?'⏸':'▶'}</button>
      <button class="iconbtn" title="Reset trafik" onclick="resetClient('${esc(c.email)}')">↺</button>
      <button class="iconbtn danger" title="Hapus" onclick="delClient('${esc(c.email)}')">🗑</button>
    </div></td></tr>`;
}
async function toggleClient(email,en){try{await api('POST','/clients/update/'+encodeURIComponent(email),{enable:en});toast('Client diperbarui','ok');refresh();}catch(x){toast(x.message,'err');}}
async function resetClient(email){try{await api('POST','/clients/resetTraffic/'+encodeURIComponent(email));toast('Trafik direset','ok');refresh();}catch(x){toast(x.message,'err');}}
async function delClient(email){if(!confirm('Hapus client "'+email+'"?'))return;try{await api('POST','/clients/del/'+encodeURIComponent(email));toast('Client dihapus','ok');refresh();}catch(x){toast(x.message,'err');}}

// ---------- Certs ----------
function renderCerts(){
  const rows=STATE.certs||[];
  document.getElementById('view').innerHTML=`
    <div class="panelbox"><div class="head"><h3>Sertifikat TLS</h3></div>
      ${!rows.length?`<div class="empty">Belum ada sertifikat.<br><br>
        Terbitkan di VPS:<br><code style="color:var(--brand)">sudo bash ssl.sh -d domain.com -e email -k GLOBAL_API_KEY</code></div>`:`
      <div class="tablewrap"><table><thead><tr><th>Domain</th><th>Berlaku hingga</th><th>Dipakai inbound</th></tr></thead>
      <tbody>${rows.map(c=>{const used=STATE.inbounds.filter(i=>((i.streamSettings||{}).tlsSettings||{}).serverName===c.domain).map(i=>i.remark);
      return `<tr><td><b>${esc(c.domain)}</b></td><td>${esc(c.expiry||'?')}</td>
        <td>${used.length?used.map(u=>`<span class="tag">${esc(u)}</span>`).join(' '):'<span class="hint">—</span>'}</td></tr>`;}).join('')}</tbody></table></div>`}
      <div style="padding:16px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12.5px">
        Sertifikat diterbitkan lewat <code>ssl.sh</code> (Cloudflare DNS, email + Global API Key) dan otomatis diperpanjang.</div>
    </div>`;
}

      <div class="card">
        <h3 style="margin:0 0 16px">Umum</h3>
        <div class="field"><label>Domain / IP publik (untuk share link)</label>
          <input class="input" id="s_domain" value="${esc(s.domain||'')}"></div>
        <div class="row2">
          <div class="field"><label>Interval job (detik)</label><input class="input" id="s_job" type="number" value="${s.job_interval||20}"></div>
          <div class="field"><label>Jendela limit IP (detik)</label><input class="input" id="s_ipw" type="number" value="${s.ip_limit_window||60}"></div>
        </div>
        <div class="hint">Port panel: <b>${s.port}</b> · Base path: <b>${s.base_path||'(none)'}</b> — ubah lewat <code>xm settings set</code> lalu restart service.</div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 16px">Webhook sinkronisasi (web API)</h3>
        <div class="field"><label>Webhook URL</label><input class="input" id="s_wh" value="${esc(s.webhook_url||'')}" placeholder="https://web-anda.com/api/panel_event.php"></div>
        <div class="row2">
          <div class="field"><label>Webhook API key (X-API-KEY)</label><input class="input" id="s_whk" value="${esc(s.webhook_api_key||'')}"></div>

async function saveSettings(){
  try{await api('POST','/settings/update',{
    domain:s_domain.value,job_interval:s_job.value,ip_limit_window:s_ipw.value,
    webhook_url:s_wh.value,webhook_api_key:s_whk.value,sync_push_interval:s_push.value});
    toast('Pengaturan tersimpan','ok');refresh();
  }catch(x){toast(x.message,'err');}
}

// ---------- Modals ----------
function openModal(html){document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

function switchInbTab(mode) {
  const isSimple = mode === 'simple';
  document.getElementById('inb_simple_form').style.display = isSimple ? '' : 'none';
  document.getElementById('inb_advanced_form').style.display = isSimple ? 'none' : '';
  const tabSimple = document.getElementById('tab_simple');
  const tabAdv = document.getElementById('tab_advanced');
  if (isSimple) {
    tabSimple.style.fontWeight = 'bold';
    tabSimple.style.color = 'var(--brand)';
    tabAdv.style.fontWeight = 'normal';
    tabAdv.style.color = '#666';
  } else {
    tabSimple.style.fontWeight = 'normal';
    tabSimple.style.color = '#666';
    tabAdv.style.fontWeight = 'bold';
    tabAdv.style.color = 'var(--brand)';
  }
}

function modalAddInbound(){
  const certs=STATE.certs||[];
  const protos=(STATE.settings.protocols||[]);
  const nets=(STATE.settings.networks||[]);
  const secs=(STATE.settings.securities||[]);
  openModal(`
    <div class="mhead"><h3>Tambah Inbound</h3><button class="close" onclick="closeModal()">×</button></div>
    
    <div class="modal-tabs" style="display:flex;gap:15px;margin:10px 20px;border-bottom:1px solid #eee;padding-bottom:10px;">
      <a href="#" id="tab_simple" style="font-weight:bold;text-decoration:none;color:var(--brand)" onclick="switchInbTab('simple');return false;">Form Sederhana</a>
      <a href="#" id="tab_advanced" style="text-decoration:none;color:#666" onclick="switchInbTab('advanced');return false;">Custom JSON (Lengkap)</a>
    </div>
    
    <div class="mbody">
      <!-- FORM SEDERHANA -->
      <div id="inb_simple_form">
        <div class="row2">
          <div class="field"><label>Protokol</label><select class="input" id="i_proto" onchange="inbFormToggle()">
            ${protos.map(p=>`<option ${p==='vless'?'selected':''}>${p}</option>`).join('')}</select></div>
          <div class="field"><label>Port</label><input class="input" id="i_port" type="number" placeholder="8443"></div>
        </div>
        <div class="field"><label>Remark</label><input class="input" id="i_remark" placeholder="mis. VLESS Reality"></div>
        <div class="row2" id="i_transportRow">
          <div class="field"><label>Transport</label><select class="input" id="i_net">
            ${nets.map(n=>`<option>${n}</option>`).join('')}</select></div>
          <div class="field"><label>Security</label><select class="input" id="i_sec" onchange="inbFormToggle()">
            ${secs.map(n=>`<option>${n}</option>`).join('')}</select></div>
        </div>
        <div class="field" id="f_path"><label>Path / serviceName</label><input class="input" id="i_path" placeholder="/ws"></div>
        <div class="field" id="f_host"><label>Host header</label><input class="input" id="i_host" placeholder="cdn.domain.com"></div>
        <div class="field" id="f_cert"><label>Sertifikat TLS (domain)</label>
          <select class="input" id="i_cert"><option value="">— pilih (opsional) —</option>
          ${certs.map(c=>`<option>${c.domain}</option>`).join('')}</select>
          <div class="hint">Otomatis mengisi SNI & mengaktifkan TLS. Kosong → isi SNI manual di bawah.</div></div>
        <div class="field" id="f_sni"><label>SNI</label><input class="input" id="i_sni" placeholder="vpn.domain.com"></div>
        <div class="field" id="f_dest"><label>REALITY dest</label><input class="input" id="i_dest" placeholder="yahoo.com:443" value="yahoo.com:443"></div>
        <div class="field" id="f_hynote"><div class="hint" style="color:var(--brand)">⚡ Hysteria2 (QUIC/UDP) — ringan & latensi rendah untuk video/voice call. Wajib pilih sertifikat TLS di atas.</div></div>
        <div class="field" id="f_method"><label>Metode Shadowsocks</label>
          <select class="input" id="i_method"><option>chacha20-ietf-poly1305</option><option>2022-blake3-aes-128-gcm</option><option>2022-blake3-aes-256-gcm</option></select></div>
        <div class="row2">
          <div class="field"><label>Limit trafik (GB, 0=∞)</label><input class="input" id="i_gb" type="number" value="0"></div>
          <div class="field"><label>Masa aktif (hari, 0=∞)</label><input class="input" id="i_days" type="number" value="0"></div>
        </div>
      </div>
      
      <!-- FORM ADVANCED (CUSTOM JSON) -->
      <div id="inb_advanced_form" style="display:none;">
        <div class="row2">
          <div class="field"><label>Protokol</label><input class="input" id="i_proto_adv" placeholder="vless" value="vless"></div>
          <div class="field"><label>Port</label><input class="input" id="i_port_adv" type="number" placeholder="8443"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Listen IP</label><input class="input" id="i_listen_adv" placeholder="0.0.0.0" value="0.0.0.0"></div>
          <div class="field"><label>Tag (Inbound Tag)</label><input class="input" id="i_tag_adv" placeholder="in-vless-8443"></div>
        </div>
        <div class="field"><label>Remark</label><input class="input" id="i_remark_adv" placeholder="Remark inbound"></div>
        
        <div class="field">
          <label>Settings (JSON)</label>
          <textarea class="input" id="i_settings_json" rows="5" style="font-family:monospace;font-size:12px;" placeholder='{\n  "clients": [],\n  "decryption": "none",\n  "fallbacks": []\n}'></textarea>
        </div>
        <div class="field">
          <label>Stream Settings (JSON)</label>
          <textarea class="input" id="i_stream_json" rows="5" style="font-family:monospace;font-size:12px;" placeholder='{\n  "network": "tcp",\n  "security": "none"\n}'></textarea>
        </div>
        <div class="field">
          <label>Sniffing Settings (JSON)</label>
          <textarea class="input" id="i_sniffing_json" rows="3" style="font-family:monospace;font-size:12px;" placeholder='{\n  "enabled": true,\n  "destOverride": ["http", "tls", "quic", "fakedns"],\n  "metadataOnly": false,\n  "routeOnly": false\n}'></textarea>
        </div>
      </div>
    </div>
    
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitInbound()">Buat</button></div>`);
  inbFormToggle();
}
function inbFormToggle(){
  const p=i_proto.value,sec=i_sec?i_sec.value:'none';
  const isHy=p==='hysteria';
  const show=(id,on)=>{const e=document.getElementById(id);if(e)e.style.display=on?'':'none';};
  const transportProtos=['vless','vmess','trojan','shadowsocks','socks','http'];
  show('i_transportRow',transportProtos.includes(p));
  const net=i_net?i_net.value:'tcp';
  show('f_path',transportProtos.includes(p)&&['ws','grpc','httpupgrade','xhttp'].includes(net));
  show('f_host',['ws','httpupgrade','xhttp'].includes(net));
  show('f_cert',sec==='tls'||isHy);   // Hysteria2 wajib TLS
  show('f_sni',sec==='tls'||sec==='reality'||isHy);
  show('f_dest',sec==='reality');
  show('f_method',p==='shadowsocks');
  show('f_hynote',isHy);
}
async function submitInbound(){
  const isAdv = document.getElementById('inb_advanced_form').style.display !== 'none';
  let body={};
  if(isAdv){
    const port = Number(document.getElementById('i_port_adv').value);
    const protocol = document.getElementById('i_proto_adv').value.trim();
    const listen = document.getElementById('i_listen_adv').value.trim();
    const tag = document.getElementById('i_tag_adv').value.trim();
    const remark = document.getElementById('i_remark_adv').value.trim();
    if(!port){toast('Port wajib diisi','err');return;}
    if(!protocol){toast('Protokol wajib diisi','err');return;}
    let settings = {};
    let streamSettings = {};
    let sniffing = {};
    try {
      const sVal = document.getElementById('i_settings_json').value.trim();
      if(sVal) settings = JSON.parse(sVal);
    } catch(x) {
      toast('Format JSON Settings tidak valid! ' + x.message, 'err');
      return;
    }
    try {
      const ssVal = document.getElementById('i_stream_json').value.trim();
      if(ssVal) streamSettings = JSON.parse(ssVal);
    } catch(x) {
      toast('Format JSON Stream Settings tidak valid! ' + x.message, 'err');
      return;
    }
    try {
      const snVal = document.getElementById('i_sniffing_json').value.trim();
      if(snVal) sniffing = JSON.parse(snVal);
    } catch(x) {
      toast('Format JSON Sniffing tidak valid! ' + x.message, 'err');
      return;
    }
    body = {
      protocol,
      port,
      listen: listen || '0.0.0.0',
      tag: tag || ('in-' + protocol + '-' + port),
      remark: remark || tag || ('in-' + protocol + '-' + port),
      settings: JSON.stringify(settings),
      streamSettings: JSON.stringify(streamSettings),
      sniffing: JSON.stringify(sniffing)
    };
  } else {
    const p=i_proto.value;
    body={protocol:p,port:Number(i_port.value),remark:i_remark.value};
    const transportProtos=['vless','vmess','trojan','shadowsocks','socks','http'];
    if(transportProtos.includes(p)){body.network=i_net.value;body.security=i_sec.value;}
    if(i_path&&f_path.style.display!=='none')body.path=i_path.value;
    if(i_host&&f_host.style.display!=='none')body.host=i_host.value;
    if(i_cert&&i_cert.value){body.certDomain=i_cert.value;}
    if(i_sni&&i_sni.value)body.sni=i_sni.value;
    if(i_dest&&f_dest.style.display!=='none')body.dest=i_dest.value;
    if(p==='shadowsocks')body.method=i_method.value;
    if(Number(i_gb.value)>0)body.total=Math.round(Number(i_gb.value)*1024**3);
    if(Number(i_days.value)>0)body.expiryTime=Date.now()+Number(i_days.value)*86400000;
    if(!body.port){toast('Port wajib diisi','err');return;}
  }
  try{await api('POST','/inbounds/add',body);toast('Inbound dibuat','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

function modalAddClient(){
  const ibs=STATE.inbounds;
  if(!ibs.length){toast('Buat inbound dulu','err');return;}
  openModal(`
    <div class="mhead"><h3>Tambah Client</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="field"><label>Inbound</label><select class="input" id="c_ib">
        ${ibs.map(i=>`<option value="${i.id}">${esc(i.remark)} (${i.protocol}:${i.port})</option>`).join('')}</select></div>
      <div class="field"><label>Email / nama</label><input class="input" id="c_email" placeholder="budi"></div>
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="c_gb" type="number" value="0"></div>
        <div class="field"><label>Masa aktif (hari, 0=∞)</label><input class="input" id="c_days" type="number" value="30"></div>
      </div>
      <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="c_ip" type="number" value="0"></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitClient()">Buat</button></div>`);
}
async function submitClient(){
  const client={email:c_email.value.trim()};
  if(Number(c_gb.value)>0)client.totalGB=Math.round(Number(c_gb.value)*1024**3);
  if(Number(c_days.value)>0)client.expiryTime=Date.now()+Number(c_days.value)*86400000;
  if(Number(c_ip.value)>0)client.limitIp=Number(c_ip.value);
  try{const c=await api('POST','/clients/add',{client,inboundIds:[Number(c_ib.value)]});
    toast('Client dibuat','ok');closeModal();refresh();
    setTimeout(()=>modalShare(c.email),300);
  }catch(x){toast(x.message,'err');}
}

function modalEditClient(email){
  const c=STATE.clients.find(x=>x.email===email);if(!c)return;
  const gb=c.totalGB?(c.totalGB/1024**3).toFixed(2):0;
  openModal(`
    <div class="mhead"><h3>Edit ${esc(email)}</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="e_gb" type="number" value="${gb}"></div>
        <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="e_ip" type="number" value="${c.limitIp||0}"></div>
      </div>
      <div class="field"><label>Perpanjang (+hari dari kadaluarsa saat ini)</label><input class="input" id="e_add" type="number" value="0"></div>
      <div class="hint">Kadaluarsa sekarang: ${fmtExpiry(c.expiryTime).t}</div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitEdit('${esc(email)}')">Simpan</button></div>`);
}
async function submitEdit(email){
  const c=STATE.clients.find(x=>x.email===email);
  const body={totalGB:Math.round(Number(e_gb.value)*1024**3),limitIp:Number(e_ip.value)};
  const add=Number(e_add.value);
  if(add){const base=(c.expiryTime&&c.expiryTime>Date.now())?c.expiryTime:Date.now();body.expiryTime=base+add*86400000;}
  try{await api('POST','/clients/update/'+encodeURIComponent(email),body);toast('Tersimpan','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

async function modalShare(email){
  openModal(`<div class="mhead"><h3>Share — ${esc(email)}</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody"><div class="linkbox" id="shr">Memuat…</div>
      <div class="qrwrap"><img id="shrqr" alt="QR"></div>
      <button class="btn primary block" style="margin-top:14px" onclick="copyLink()">Salin link</button></div>`);
  try{
    const o=await api('GET','/clients/link/'+encodeURIComponent(email));
    document.getElementById('shr').textContent=o.link;
    document.getElementById('shrqr').src=API+'/clients/qr/'+encodeURIComponent(email);
    window.__link=o.link;
  }catch(x){document.getElementById('shr').textContent=x.message;}
}
function copyLink(){navigator.clipboard.writeText(window.__link||'').then(()=>toast('Link disalin','ok'));}

// ---------- boot ----------
(async function(){
  try{await api('GET','/server/status');showApp();}catch(x){showLogin();}
})();
</script>
</body>
