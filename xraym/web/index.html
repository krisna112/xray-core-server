<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OceanShark Xray Manager</title>
<style>
:root{
  --bg:#0b1120; --bg2:#0f172a; --panel:#141d30; --panel2:#1a2436;
  --border:#243247; --border2:#2d3d54;
  --text:#e6ecf5; --muted:#8698b3; --faint:#5b6b85;
  --brand:#06b6d4; --brand2:#0891b2; --brandglow:rgba(6,182,212,.15);
  --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; --info:#3b82f6;
  --radius:14px; --radius-sm:9px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%, #10233a 0%, transparent 60%),
             radial-gradient(900px 500px at -10% 110%, #0d2130 0%, transparent 55%), var(--bg);
  color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{
  width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:34px 30px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.logo .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--brand),#0369a1);font-size:20px}
.logo h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
.login-card .sub{color:var(--muted);font-size:13px;margin:4px 0 24px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:500}
.input,select.input,textarea.input{
  width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:11px 13px;font-size:14px;outline:none;transition:.15s}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandglow)}
input[type="datetime-local"].input,input[type="date"].input,input[type="time"].input{color-scheme:dark}
.btn{
  border:1px solid transparent;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;
  font-weight:600;background:var(--panel2);color:var(--text);transition:.15s;display:inline-flex;
  align-items:center;gap:7px;justify-content:center}
.btn:hover{filter:brightness(1.12)}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04222b}
.btn.ok{background:var(--ok);color:#052e14}
.btn.danger{background:transparent;border-color:var(--danger);color:#fca5a5}
.btn.danger:hover{background:rgba(239,68,68,.12)}
.btn.ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
.btn.sm{padding:6px 10px;font-size:12.5px}
.btn.block{width:100%}
.err{color:#fca5a5;font-size:13px;margin-top:10px;min-height:18px}

/* ---------- App shell ---------- */
#app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
aside{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
  border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column}
aside .logo{padding:6px 8px 20px}
nav{display:flex;flex-direction:column;gap:4px;flex:1}
nav .item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;
  color:var(--muted);font-size:14px;font-weight:500;transition:.15s;border:1px solid transparent}
nav .item:hover{background:var(--panel2);color:var(--text)}
nav .item.active{background:var(--brandglow);color:var(--brand);border-color:rgba(6,182,212,.25)}
nav .item .ic{width:18px;text-align:center;font-size:16px}
aside .foot{font-size:11.5px;color:var(--faint);padding:12px 10px 2px;border-top:1px solid var(--border);margin-top:8px}

main{padding:26px 30px;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.topbar h2{margin:0;font-size:21px;font-weight:700}
.topbar .right{display:flex;align-items:center;gap:12px}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;
  font-size:12.5px;font-weight:600;background:var(--panel);border:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.off{background:var(--danger)}
.autoref{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);
  border-radius:999px;padding:4px 8px 4px 11px;font-size:12.5px;color:var(--muted);cursor:pointer}
.autoref #autoref_ic{font-size:13px;display:inline-block;line-height:1}
.autoref.active{border-color:rgba(6,182,212,.35);color:var(--brand)}
.autoref.active #autoref_ic{color:var(--brand);animation:spin 1.1s linear infinite}
.autoref select{background:transparent;border:none;color:inherit;font-size:12.5px;font-weight:600;
  outline:none;cursor:pointer;font-family:inherit}
.autoref select option{background:var(--panel2);color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Cards / stats ---------- */
.grid{display:grid;gap:16px}
.stats{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat .label{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:8px}
.stat .val{font-size:26px;font-weight:750;margin-top:8px;letter-spacing:-.5px}
.stat .val small{font-size:13px;color:var(--muted);font-weight:500}
.stat .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;
  background:var(--brandglow);color:var(--brand)}

/* ---------- Table ---------- */
.panelbox{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panelbox .head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
.panelbox .head h3{margin:0;font-size:15px;font-weight:650}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
th{text-align:left;padding:12px 16px;color:var(--muted);font-weight:600;font-size:11.5px;
  text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);white-space:nowrap}
td{padding:13px 16px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;
  font-weight:600;background:var(--panel2);border:1px solid var(--border2)}
.tag.vless{color:#38bdf8}.tag.vmess{color:#c084fc}.tag.trojan{color:#fb7185}
.tag.shadowsocks{color:#34d399}.tag.wireguard{color:#fbbf24}.tag.socks,.tag.http{color:#94a3b8}
.tag.dokodemo-door{color:#a3a3a3}
.badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.on{background:rgba(34,197,94,.14);color:#4ade80}
.badge.off{background:rgba(239,68,68,.14);color:#f87171}
.badge.exp{background:rgba(245,158,11,.14);color:#fbbf24}
.online-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.online-dot.y{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.online-dot.n{background:var(--faint)}
.usebar{height:6px;border-radius:4px;background:var(--bg2);overflow:hidden;margin-top:5px;min-width:90px}
.usebar > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#22d3ee)}
.usebar > i.hi{background:linear-gradient(90deg,var(--warn),var(--danger))}
.rowacts{display:flex;gap:6px;flex-wrap:wrap}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--panel2);
  color:var(--muted);display:grid;place-items:center;font-size:14px;transition:.15s}
.iconbtn:hover{color:var(--text);border-color:var(--brand)}
.iconbtn.danger:hover{color:#fca5a5;border-color:var(--danger)}
.empty{padding:44px;text-align:center;color:var(--muted);font-size:14px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,10,20,.66);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);
  width:100%;max-width:520px;box-shadow:var(--shadow);animation:pop .16s ease}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal .mhead{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal .mhead h3{margin:0;font-size:16px}
.modal .mbody{padding:20px 22px;max-height:66vh;overflow-y:auto}
.modal .mfoot{padding:15px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.hint{font-size:11.5px;color:var(--faint);margin-top:5px}
.close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1}
.modal.wide{max-width:720px}
.itabs{display:flex;gap:2px;flex-wrap:wrap;padding:0 22px;border-bottom:1px solid var(--border)}
.itab{padding:10px 13px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;
  border-bottom:2px solid transparent;cursor:pointer;transition:.15s}
.itab:hover{color:var(--text)}
.itab.active{color:var(--brand);border-bottom-color:var(--brand)}
.isec{border:1px solid var(--border);border-radius:var(--radius-sm);padding:15px 16px;margin-bottom:16px;background:var(--bg2)}
.isec .seclabel{font-size:11.5px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px}
.isec .secdesc{font-size:12.5px;color:var(--faint);margin:-7px 0 15px;font-weight:400}
.warnbox{color:var(--warn);border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.08);
  padding:11px 14px;border-radius:var(--radius-sm);font-size:12.5px;line-height:1.55;margin-top:4px}
.chk{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--text)}
.chkrow{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.field .withbtn{display:flex;gap:8px}
.field .withbtn .input{flex:1}
.btn.gen{padding:8px 12px;font-size:12.5px;white-space:nowrap;background:var(--panel2);border-color:var(--border2);color:var(--brand)}

/* share link box */
.linkbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all;color:#a5f3fc;
  white-space:pre-wrap;max-height:180px;overflow:auto}
.qrwrap{display:flex;justify-content:center;padding:16px;background:#fff;border-radius:var(--radius-sm);margin-top:14px}
.qrwrap img,.qrwrap svg{width:210px;height:210px}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:100}
.toast{background:var(--panel2);border:1px solid var(--border2);border-left:3px solid var(--brand);
  padding:12px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);min-width:220px;animation:pop .16s}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--danger)}

@media(max-width:820px){
  #app{grid-template-columns:1fr}
  aside{position:fixed;z-index:40;left:-260px;width:230px;transition:.2s;box-shadow:var(--shadow)}
  aside.show{left:0}
  main{padding:18px 16px}
  .menutoggle{display:grid!important}
}
.menutoggle{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--panel);color:var(--text);place-items:center;font-size:18px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="logo"><div class="mark">🦈</div><h1>OceanShark</h1></div>
    <div class="sub">Xray Manager — masuk untuk mengelola server</div>
    <div class="field"><label>Username</label><input class="input" id="lu" autocomplete="username" required></div>
    <div class="field"><label>Password</label><input class="input" id="lp" type="password" autocomplete="current-password" required></div>
    <button class="btn primary block" type="submit">Masuk</button>
    <div class="err" id="lerr"></div>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <aside id="side">
    <div class="logo"><div class="mark">🦈</div><h1>OceanShark</h1></div>
    <nav>
      <a class="item active" data-page="dash"><span class="ic">▤</span> Dashboard</a>
      <a class="item" data-page="inbounds"><span class="ic">↧</span> Inbounds</a>
      <a class="item" data-page="clients"><span class="ic">☺</span> Clients</a>
      <a class="item" data-page="settings"><span class="ic">⚙</span> Pengaturan</a>
    </nav>
    <div class="foot">v{{VERSION}} · <a href="#" onclick="doLogout();return false">Keluar</a></div>
  </aside>

  <main>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menutoggle" onclick="document.getElementById('side').classList.toggle('show')">☰</button>
        <h2 id="ptitle">Dashboard</h2>
      </div>
      <div class="right">
        <span class="pill"><span class="dot" id="xdot"></span><span id="xstate">…</span></span>
        <label class="autoref" title="Auto refresh — berhenti saat tab tak aktif / ada dialog terbuka">
          <span id="autoref_ic">↻</span>
          <select id="autoref" onchange="setAutoRefresh(this.value)">
            <option value="0">Manual</option>
            <option value="5">Tiap 5 dtk</option>
            <option value="10">Tiap 10 dtk</option>
            <option value="30">Tiap 30 dtk</option>
            <option value="60">Tiap 60 dtk</option>
          </select>
        </label>
        <button class="btn ghost sm" onclick="refresh()">↻ Refresh</button>
      </div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
const BASE = "{{BASE}}";
const API = BASE + "/panel/api";
let STATE = {inbounds:[], clients:[], settings:null, status:null, certs:[]};

// ---------- helpers ----------
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg,kind){const t=el(`<div class="toast ${kind||''}">${esc(msg)}</div>`);document.getElementById('toast').appendChild(t);setTimeout(()=>t.remove(),3200);}
function fmtBytes(n){n=Number(n||0);if(!n)return '0 B';const u=['B','KB','MB','GB','TB'];let i=0;while(Math.abs(n)>=1024&&i<u.length-1){n/=1024;i++;}return (i?n.toFixed(1):n)+' '+u[i];}
function activeTZ(){const t=STATE.settings&&STATE.settings.timezone;if(!t)return undefined;try{new Intl.DateTimeFormat('id-ID',{timeZone:t});return t;}catch(e){return undefined;}}
function fmtExpiry(ms){ms=Number(ms||0);if(ms===0)return {t:'Selamanya',c:''};if(ms<0)return {t:(Math.abs(ms)/86400000|0)+'h saat dipakai',c:''};const d=new Date(ms);const exp=ms<Date.now();return {t:d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',timeZone:activeTZ()}),c:exp?'exp':''};}
function daysLeft(ms){if(!ms||ms<0)return null;return Math.ceil((ms-Date.now())/86400000);}

async function api(method,path,body){
  const opt={method,headers:{},credentials:'same-origin'};
  if(body!==undefined){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(body);}
  const r=await fetch(API+path,opt);
  if(r.status===401){showLogin();throw new Error('Sesi berakhir, silakan login.');}
  const ct=r.headers.get('content-type')||'';
  if(ct.includes('json')){const j=await r.json();if(!j.success)throw new Error(j.msg||'Gagal');return j.obj;}
  return await r.text();
}

// ---------- auth ----------
async function doLogin(e){
  e.preventDefault();
  const err=document.getElementById('lerr');err.textContent='';
  try{
    const r=await fetch(BASE+'/login',{method:'POST',headers:{'Content-Type':'application/json'},
      credentials:'same-origin',body:JSON.stringify({username:lu.value,password:lp.value})});
    const j=await r.json();
    if(!j.success){err.textContent=j.msg||'Login gagal';return;}
    showApp();
  }catch(x){err.textContent='Tidak bisa terhubung ke server.';}
}
async function doLogout(){try{await fetch(BASE+'/logout',{credentials:'same-origin'});}catch(x){}showLogin();}
function showLogin(){stopAutoRefresh();document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');refresh();initAutoRefresh();}

// ---------- data ----------
let REFRESHING=false;
async function refresh(silent){
  if(REFRESHING)return;            // hindari tumpukan saat request lambat
  REFRESHING=true;
  try{
    const [status,inboundsRaw,clients,settings,certsRaw]=await Promise.all([
      api('GET','/server/status'),api('GET','/inbounds/list'),api('GET','/clients/list'),
      api('GET','/settings'),api('GET','/certs')]);
    // /certs mengembalikan {certs:[...],lastRenewAt}; dukung juga bentuk array lama.
    const certs = Array.isArray(certsRaw) ? certsRaw : ((certsRaw && certsRaw.certs) || []);
    const inbounds = (inboundsRaw || []).map(ib => ({
      ...ib,
      settings: typeof ib.settings === 'string' ? JSON.parse(ib.settings) : (ib.settings || {}),
      streamSettings: typeof ib.streamSettings === 'string' ? JSON.parse(ib.streamSettings) : (ib.streamSettings || {}),
      sniffing: typeof ib.sniffing === 'string' ? JSON.parse(ib.sniffing) : (ib.sniffing || {})
    }));
    STATE={status,inbounds,clients,settings,certs};
    paintStatus();render();
  }catch(x){if(!x.message.includes('Sesi')&&!silent)toast(x.message,'err');}
  finally{REFRESHING=false;}
}
function paintStatus(){
  const s=STATE.status||{};const xr=(s.xray||{});
  const on=xr.state==='running';
  document.getElementById('xdot').className='dot '+(on?'on':'off');
  document.getElementById('xstate').textContent='Xray '+(on?'aktif':'mati')+(xr.version?' · '+xr.version.split(' ')[1]||'':'');
}

// ---------- auto refresh (berhenti saat tab tak aktif / ada dialog) ----------
let AUTO_TIMER=null, AUTO_SEC=0;
function autoTick(){
  if(document.hidden)return;                                   // hemat: tab tak aktif
  if(document.getElementById('modalRoot').innerHTML.trim())return; // jangan ganggu form/dialog
  if(PAGE==='settings')return;                                 // jangan menimpa form pengaturan
  const ae=document.activeElement;                             // jangan ganggu saat mengetik
  if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))return;
  refresh(true);                                               // silent: tak spam toast error
}
function setAutoRefresh(sec){
  AUTO_SEC=Number(sec)||0;
  try{localStorage.setItem('xm_autoref',String(AUTO_SEC));}catch(e){}
  const sel=document.getElementById('autoref'); if(sel)sel.value=String(AUTO_SEC);
  const wrap=document.querySelector('.autoref'); if(wrap)wrap.classList.toggle('active',AUTO_SEC>0);
  if(AUTO_TIMER){clearInterval(AUTO_TIMER);AUTO_TIMER=null;}
  if(AUTO_SEC>0)AUTO_TIMER=setInterval(autoTick,AUTO_SEC*1000);
}
function stopAutoRefresh(){if(AUTO_TIMER){clearInterval(AUTO_TIMER);AUTO_TIMER=null;}}
function initAutoRefresh(){
  let sec=10;   // default: nyala tiap 10 dtk (bisa diubah/ dimatikan, tersimpan)
  try{const v=localStorage.getItem('xm_autoref');if(v!==null)sec=Number(v)||0;}catch(e){}
  setAutoRefresh(sec);
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&AUTO_SEC>0)autoTick();});

// ---------- routing ----------
let PAGE='dash';
const TITLES={dash:'Dashboard',inbounds:'Inbounds',clients:'Clients',settings:'Pengaturan'};
document.querySelectorAll('nav .item').forEach(a=>a.onclick=()=>{
  PAGE=a.dataset.page;
  document.querySelectorAll('nav .item').forEach(x=>x.classList.toggle('active',x===a));
  document.getElementById('ptitle').textContent=TITLES[PAGE];
  document.getElementById('side').classList.remove('show');
  render();
});
let CLOCK_TIMER=null;
function render(){
  if(CLOCK_TIMER){clearInterval(CLOCK_TIMER);CLOCK_TIMER=null;}  // hentikan jam saat pindah halaman
  ({dash:renderDash,inbounds:renderInbounds,clients:renderClients,settings:renderSettings}[PAGE])();
}

// ---------- Dashboard ----------
function renderDash(){
  const s=STATE.status||{};const xr=s.xray||{};const mem=s.mem||{};
  const online=STATE.clients.filter(c=>c.online).length;
  const memPct=mem.total?Math.round(mem.current/mem.total*100):0;
  const up=s.uptime?(s.uptime/86400).toFixed(1)+' hari':'—';
  const cards=[
    ['Status Xray',(xr.state==='running'?'Aktif':'Mati'),xr.version||'',(xr.state==='running'?'🟢':'🔴')],
    ['Total Inbound',STATE.inbounds.length,'',''+'↧'],

    ['CPU Load',(s.cpu??0).toFixed(2),'','◈'],
    ['Uptime',up,'','⏱'],
  ];

async function saveSettings(){
  const v=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const ck=id=>{const e=document.getElementById(id);return e?e.checked:false;};
  try{const r=await api('POST','/settings/update',{
    port:v('s_port'),
    base_path:v('s_uri').trim(),session_hours:v('s_sess'),
    panel_cert_file:v('s_panelcert').trim(),panel_key_file:v('s_panelkey').trim(),
    job_interval:v('s_job'),ip_limit_window:v('s_ipw'),
    realtime:ck('s_realtime'),timezone:v('s_tz').trim(),
    webhook_url:v('s_wh'),webhook_api_key:v('s_whk'),sync_push_interval:v('s_push'),
    tg_enable:ck('s_tgen'),tg_bot_token:v('s_tgtoken').trim(),tg_chat_id:v('s_tgchat').trim()});
    const restartFields=['port','base_path','panel_cert_file','panel_key_file'];
    const willRestart=r&&r.needRestart&&r.needRestart.length>0;
    if(willRestart){
      toast('Tersimpan. Restart service otomatis berjalan…','ok');
      await reconnectAfterRestart();
    }else{
      toast('Pengaturan tersimpan','ok');
      refresh();
    }
  }catch(x){toast(x.message,'err');}
}
async function reconnectAfterRestart(){
  // Panel di-restart → koneksi sempat gagal. Poll tiap 2 dtk sampai hidup lagi.
  const tryOnce=()=>new Promise((res)=>{fetch(API+'/server/status',{credentials:'same-origin'})
    .then(()=>res(true)).catch(()=>res(false));});
  let alive=false;
  for(let i=0;i<30;i++){            // maks ~60 dtk
    await new Promise(r=>setTimeout(r,2000));
    alive=await tryOnce();
    if(alive)break;
  }
  if(alive){toast('Panel kembali online 🦈','ok');await refresh();}
  else{toast('Panel belum respons. Muat ulang halaman secara manual.','err');}
}

// Isi ulang form dari inbound yang sudah ada (kebalikan dari buildProtoSettings/buildStream/applySecurity/buildSniffing).
function fillInboundForm(ib){
  const S=ib.settings||{}, ST=ib.streamSettings||{}, SN=ib.sniffing||{}, p=ib.protocol;
  const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=(v==null?'':v);};
  const sc=(id,b)=>{const e=document.getElementById(id);if(e)e.checked=!!b;};
  const join=(v,d)=>Array.isArray(v)?v.filter(x=>x!=='').join(','):(v!=null?v:(d||''));

  // ----- Umum -----
  sv('i_port', ib.port);
  sv('i_remark', ib.remark);
  sv('i_listen', ib.listen||'0.0.0.0');
  sv('i_tag', ib.tag);
  sv('i_gb', ib.total?+(ib.total/1024**3).toFixed(2):0);
  const rem=daysLeft(ib.expiryTime);
  sv('i_days', (ib.expiryTime>0&&rem!=null)?Math.max(0,rem):0);

  // ----- Protokol-spesifik (settings) -----
  if(p==='shadowsocks') sv('i_ss_method', S.method);
  if(p==='wireguard'){ sv('i_wg_mtu', S.mtu||1420); sv('i_wg_secret', S.secretKey); }
  if(p==='socks'){ sv('i_socks_ip', S.ip||'127.0.0.1'); sc('i_socks_udp', S.udp!==false); }
  if(p==='dokodemo-door'){ sv('i_doko_addr', S.address||'127.0.0.1'); sv('i_doko_port', S.port||80);
    sv('i_doko_net', S.network||'tcp,udp'); sc('i_doko_redirect', S.followRedirect); }
  if(p==='hysteria'){
    const hy=ST.hysteriaSettings||{};
    if(hy.obfs&&hy.obfs.password) sv('i_hy_obfs', hy.obfs.password);
    if(hy.congestion){ sv('i_hy_up', hy.congestion.up_mbps||0); sv('i_hy_down', hy.congestion.down_mbps||0); }
  }

  // ----- Transport (network) -----
  const net=ST.network||'tcp';
  if(['tcp','kcp','ws','grpc','httpupgrade','xhttp'].indexOf(net)>=0) sv('i_net', net);
  if(net==='tcp'){
    const tcp=ST.tcpSettings||{}, ht=(tcp.header&&tcp.header.type)||'none';
    sv('i_tcp_header', ht);
    if(ht==='http'){ const req=tcp.header.request||{};
      sv('i_path', (req.path&&req.path[0])||'/');
      sv('i_path_host', join((req.headers&&req.headers.Host)));
    }
  } else if(net==='kcp'){
    const k=ST.kcpSettings||{};
    sv('i_kcp_mtu',k.mtu||1350); sv('i_kcp_tti',k.tti||50);
    sv('i_kcp_up',k.uplinkCapacity||5); sv('i_kcp_down',k.downlinkCapacity||20);
    sc('i_kcp_congestion',k.congestion); sv('i_kcp_header',(k.header&&k.header.type)||'none');
    sv('i_kcp_seed',k.seed);
  } else if(net==='ws'){
    const w=ST.wsSettings||{}; sv('i_ws_path',w.path||'/'); sv('i_ws_host',w.host);
    sv('i_ws_heartbeat',w.heartbeatPeriod||0);
  } else if(net==='grpc'){
    const g=ST.grpcSettings||{}; sv('i_grpc_service',g.serviceName); sv('i_grpc_authority',g.authority);
    sc('i_grpc_multi',g.multiMode);
  } else if(net==='httpupgrade'){
    const h=ST.httpupgradeSettings||{}; sv('i_hu_path',h.path||'/'); sv('i_hu_host',h.host);
  } else if(net==='xhttp'){
    const x=ST.xhttpSettings||{}; sv('i_xh_path',x.path||'/'); sv('i_xh_host',x.host); sv('i_xh_mode',x.mode||'auto');
  }

  // ----- Security (TLS / REALITY) -----
  const sec=ST.security||'none';
  sv('i_sec', sec);
  if(sec==='tls'){
    const t=ST.tlsSettings||{}, cert=(t.certificates&&t.certificates[0])||{};
    sv('i_sni',t.serverName);
    sv('i_alpn',join(t.alpn,'h2,http/1.1'));
    sv('i_tls_min',t.minVersion||'1.2'); sv('i_tls_max',t.maxVersion||'1.3');
    sv('i_tls_fp',t.fingerprint||'chrome');
    sv('i_cert_file',cert.certificateFile); sv('i_key_file',cert.keyFile);
  } else if(sec==='reality'){
    const r=ST.realitySettings||{};
    sv('i_dest',r.dest||r.target||'yahoo.com:443');
    sv('i_server_names',join(r.serverNames));
    sv('i_priv_key',r.privateKey); sv('i_pub_key',r.publicKey);
    sv('i_short_ids',join(r.shortIds));
    sv('i_reality_fp',r.fingerprint||'chrome'); sv('i_spider',r.spiderX||'/');
  }

  // ----- Sniffing -----
  const en=SN.enabled!==false;
  sc('i_sniff_en', en); ishow('i_sniff_opts', en);
  const ov=SN.destOverride||[];
  sc('i_sniff_http',ov.indexOf('http')>=0);
  sc('i_sniff_tls',ov.indexOf('tls')>=0);
  sc('i_sniff_quic',ov.indexOf('quic')>=0);
  sc('i_sniff_fakedns',ov.indexOf('fakedns')>=0);
  sc('i_sniff_meta',!!SN.metadataOnly);
  sc('i_sniff_route',!!SN.routeOnly);
}

function inbApplyProto(){
  const p=ival('i_proto');
  const hasStream=!['wireguard','dokodemo-door'].includes(p);
  const showTransport=hasStream && p!=='hysteria';
  // visibilitas tombol tab
  ishow('itabbtn_transport', showTransport);
  ishow('itabbtn_security', hasStream);
  // section per protokol
  ['vless','vmess','trojan','shadowsocks','hysteria','wireguard','socks','http','dokodemo-door']
    .forEach(x=>ishow('pfields_'+x, x===p));
  // hysteria: security dipaksa TLS
  const sec=document.getElementById('i_sec');
  if(sec){ if(p==='hysteria'){sec.value='tls';sec.disabled=true;} else {sec.disabled=false;} }
  // kembali ke tab Umum agar tak berdiri di tab yang tersembunyi
  inbTab('general');
  inbToggle();
}

function inbToggle(){
  const net=ival('i_net')||'tcp';
  ['tcp','kcp','ws','grpc','httpupgrade','xhttp'].forEach(n=>ishow('net_'+n, n===net || (n==='tcp'&&net==='raw')));
  ishow('tcp_http_fields', ival('i_tcp_header')==='http');
  const sec=ival('i_sec')||'none';
  ishow('sec_tls', sec==='tls');
  ishow('sec_reality', sec==='reality');
}

// ---- perakit JSON standar Xray-core ----
function buildProtoSettings(p){
  if(p==='vless')       return {clients:[],decryption:'none',fallbacks:[]};
  if(p==='vmess')       return {clients:[]};
  if(p==='trojan')      return {clients:[],fallbacks:[]};
  if(p==='shadowsocks') return {method:ival('i_ss_method')||'chacha20-ietf-poly1305',clients:[],network:'tcp,udp'};
  if(p==='hysteria')    return {version:2,clients:[]};
  if(p==='wireguard')   return {secretKey:ival('i_wg_secret').trim(),mtu:Number(ival('i_wg_mtu'))||1420,peers:[]};
  if(p==='socks')       return {auth:'password',accounts:[],udp:ick('i_socks_udp'),ip:ival('i_socks_ip')||'127.0.0.1'};
  if(p==='http')        return {accounts:[]};
  if(p==='dokodemo-door') return {address:ival('i_doko_addr')||'127.0.0.1',port:Number(ival('i_doko_port'))||80,network:ival('i_doko_net')||'tcp,udp',followRedirect:ick('i_doko_redirect')};
  return {};
}
function applySecurity(s,sec){
  if(sec==='tls'){
    const alpn=(ival('i_alpn')||'h2,http/1.1').split(',').map(x=>x.trim()).filter(Boolean);
    s.tlsSettings={
      serverName:ival('i_sni').trim(),
      minVersion:ival('i_tls_min')||'1.2',
      maxVersion:ival('i_tls_max')||'1.3',
      alpn,
      certificates:[{certificateFile:ival('i_cert_file').trim(),keyFile:ival('i_key_file').trim(),ocspStapling:3600}],
      fingerprint:ival('i_tls_fp')||'chrome',
    };
  } else if(sec==='reality'){
    const dest=ival('i_dest').trim()||'yahoo.com:443';
    const names=(ival('i_server_names').trim()||dest.split(':')[0]).split(',').map(x=>x.trim()).filter(Boolean);
    const sids=ival('i_short_ids').trim().split(',').map(x=>x.trim()).filter(Boolean);
    s.realitySettings={
      show:false, dest, xver:0, serverNames:names,
      privateKey:ival('i_priv_key').trim(), shortIds:sids,
      publicKey:ival('i_pub_key').trim(), fingerprint:ival('i_reality_fp')||'chrome', spiderX:ival('i_spider')||'/',
    };
  }
}
function buildStream(net,sec){
  const nn=(net==='raw')?'tcp':net;
  const s={network:nn,security:sec};
  if(nn==='tcp'){
    const ht=ival('i_tcp_header')||'none';
    const tcp={acceptProxyProtocol:false,header:{type:ht}};
    if(ht==='http'){
      const host=ival('i_path_host').trim();
      tcp.header.request={version:'1.1',method:'GET',path:[ival('i_path').trim()||'/'],
        headers:{Host:host?host.split(',').map(x=>x.trim()):[''],Connection:['keep-alive'],'Accept-Encoding':['gzip, deflate']}};
    }
    s.tcpSettings=tcp;
  } else if(nn==='kcp'){
    s.kcpSettings={mtu:Number(ival('i_kcp_mtu'))||1350,tti:Number(ival('i_kcp_tti'))||50,
      uplinkCapacity:Number(ival('i_kcp_up'))||5,downlinkCapacity:Number(ival('i_kcp_down'))||20,
      congestion:ick('i_kcp_congestion'),readBufferSize:2,writeBufferSize:2,
      header:{type:ival('i_kcp_header')||'none'},seed:ival('i_kcp_seed').trim()};
  } else if(nn==='ws'){
    s.wsSettings={path:ival('i_ws_path')||'/',host:ival('i_ws_host').trim()};
    const hb=Number(ival('i_ws_heartbeat')); if(hb) s.wsSettings.heartbeatPeriod=hb;
  } else if(nn==='grpc'){
    s.grpcSettings={serviceName:(ival('i_grpc_service').trim()||'grpc'),authority:ival('i_grpc_authority').trim(),multiMode:ick('i_grpc_multi')};
  } else if(nn==='httpupgrade'){
    s.httpupgradeSettings={path:ival('i_hu_path')||'/',host:ival('i_hu_host').trim()};
  } else if(nn==='xhttp'){
    s.xhttpSettings={path:ival('i_xh_path')||'/',host:ival('i_xh_host').trim(),mode:ival('i_xh_mode')||'auto'};
  }
  applySecurity(s,sec);
  return s;
}
function buildHysteriaStream(){
  const s={network:'hysteria',security:'tls'};
  const hy={version:2,udpIdleTimeout:60};
  const obfs=ival('i_hy_obfs').trim();
  if(obfs) hy.obfs={type:'salamander',password:obfs};
  const up=Number(ival('i_hy_up')),down=Number(ival('i_hy_down'));
  if(up||down) hy.congestion={type:'bbr',up_mbps:up||0,down_mbps:down||0};
  s.hysteriaSettings=hy;
  s.tlsSettings={serverName:ival('i_sni').trim(),alpn:['h3'],minVersion:'1.2',maxVersion:'1.3',
    certificates:[{certificateFile:ival('i_cert_file').trim(),keyFile:ival('i_key_file').trim(),ocspStapling:3600}],
    fingerprint:ival('i_tls_fp')||'chrome'};
  return s;
}
function buildSniffing(){
  if(!ick('i_sniff_en')) return {enabled:false};
  const ov=[];
  if(ick('i_sniff_http'))ov.push('http');
  if(ick('i_sniff_tls'))ov.push('tls');
  if(ick('i_sniff_quic'))ov.push('quic');
  if(ick('i_sniff_fakedns'))ov.push('fakedns');
  return {enabled:true,destOverride:ov,metadataOnly:ick('i_sniff_meta'),routeOnly:ick('i_sniff_route')};
}

async function submitInbound(){
  const p=ival('i_proto');
  const port=Number(ival('i_port'));
  if(!port){toast('Port wajib diisi','err');inbTab('general');return;}
  const listen=ival('i_listen').trim()||'0.0.0.0';
  const remark=ival('i_remark').trim();
  const hasStream=!['wireguard','dokodemo-door'].includes(p);

  let settings=buildProtoSettings(p);
  let streamSettings={};
  if(hasStream) streamSettings=(p==='hysteria')?buildHysteriaStream():buildStream(ival('i_net'),ival('i_sec'));
  let sniffing=buildSniffing();

  // Validasi kelengkapan TLS/Hysteria
  const needCert=(p==='hysteria')||(hasStream&&ival('i_sec')==='tls');
  if(needCert && !ival('i_cert_file').trim()){
    toast('TLS butuh certificate & key file. Pilih sertifikat atau isi path di tab TLS/Reality.','err');inbTab('security');return;
  }

  // Override via Custom JSON bila diisi
  try{
    const sj=ival('i_settings_json').trim(); if(sj) settings=JSON.parse(sj);
    const stj=ival('i_stream_json').trim(); if(stj) streamSettings=JSON.parse(stj);
    const snj=ival('i_sniffing_json').trim(); if(snj) sniffing=JSON.parse(snj);
  }catch(x){toast('JSON custom tidak valid: '+x.message,'err');inbTab('json');return;}

  // Edit inbound yang sudah ada — protokol & tag tak diubah.
  if(EDIT_INBOUND_ID){
    const upd={remark,listen,port,
      settings:JSON.stringify(settings),
      streamSettings:JSON.stringify(streamSettings),
      sniffing:JSON.stringify(sniffing),
      total:Number(ival('i_gb'))>0?Math.round(Number(ival('i_gb'))*1024**3):0,
      expiryTime:Number(ival('i_days'))>0?Date.now()+Number(ival('i_days'))*86400000:0};
    try{await api('POST','/inbounds/update/'+EDIT_INBOUND_ID,upd);toast('Inbound diperbarui','ok');closeModal();refresh();}
    catch(x){toast(x.message,'err');}
    return;
  }

  const body={protocol:p,port,listen,remark,
    settings:JSON.stringify(settings),
    streamSettings:JSON.stringify(streamSettings),
    sniffing:JSON.stringify(sniffing)};
  const tag=ival('i_tag').trim(); if(tag) body.tag=tag;
  if(Number(ival('i_gb'))>0) body.total=Math.round(Number(ival('i_gb'))*1024**3);
  if(Number(ival('i_days'))>0) body.expiryTime=Date.now()+Number(ival('i_days'))*86400000;

  try{await api('POST','/inbounds/add',body);toast('Inbound dibuat','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

// ---- kredensial client: UUID (vless/vmess) atau Password (trojan/ss/socks/http/hysteria) ala 3x-ui ----
function inboundById(id){return STATE.inbounds.find(i=>String(i.id)===String(id))||{};}
function clientCredKind(protocol){
  if(protocol==='vless'||protocol==='vmess')return 'uuid';
  if(protocol==='wireguard')return 'none';           // keypair dibuat otomatis di server
  return 'password';                                 // trojan, shadowsocks, socks, http, hysteria
}
function credHint(kind,method){
  if(kind==='uuid')return 'ID unik untuk VLESS/VMess. Kosongkan untuk dibuat otomatis.';
  if(String(method).indexOf('2022-blake3-')===0)return 'Password Shadowsocks 2022 (key base64). Kosongkan untuk dibuat otomatis.';
  return 'Password client. Kosongkan untuk dibuat otomatis.';
}
function credFieldHTML(p,kind,method,value){
  if(kind==='none')return '';
  const label=kind==='uuid'?'UUID':'Password';
  return `<div class="field" id="${p}_cred_wrap"><label id="${p}_cred_label">${label}</label>
    <div class="withbtn"><input class="input" id="${p}_cred" data-kind="${kind}" data-method="${esc(method||'')}" value="${esc(value||'')}" placeholder="auto jika kosong">
      <button type="button" class="btn gen" onclick="genClientCred('${p}')">Generate</button></div>
    <div class="hint" id="${p}_cred_hint">${credHint(kind,method)}</div></div>`;
}
async function genClientCred(p){
  const inp=document.getElementById(p+'_cred');if(!inp)return;
  const kind=inp.dataset.kind||'uuid';
  try{
    let path='/keygen/uuid',key='uuid';
    if(kind==='password'){
      const m=inp.dataset.method||'';key='password';
      path=(m.indexOf('2022-blake3-')===0)?'/keygen/ss2022?method='+encodeURIComponent(m):'/keygen/password';
    }
    const o=await api('GET',path);
    if(o&&o[key]!=null)inp.value=o[key];
  }catch(x){toast(x.message,'err');}
}
// Rebuild kolom kredensial saat inbound (protokol) di form Tambah berubah.
function addClientProtoChanged(){
  const slot=document.getElementById('c_cred_slot');if(!slot)return;
  const ib=inboundById(ival('c_ib'));
  const kind=clientCredKind(ib.protocol);
  const method=(ib.settings&&ib.settings.method)||'';
  const prev=document.getElementById('c_cred');
  const prevKind=prev?prev.dataset.kind:'';
  const keepVal=(prev&&prevKind===kind)?prev.value:'';   // pertahankan nilai bila jenisnya sama
  slot.innerHTML=credFieldHTML('c',kind,method,keepVal);
  if(kind!=='none'&&prevKind!==kind&&!keepVal.trim())genClientCred('c'); // auto-isi saat pertama/ganti jenis
}

// Konversi epoch(ms) <-> nilai input datetime-local (waktu lokal browser).
function toLocalInput(ms){
  const d=new Date(Number(ms)||Date.now());
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}
function fromLocalInput(v){
  v=(v||'').trim(); if(!v)return 0;
  const t=new Date(v).getTime();
  return isNaN(t)?0:t;
}

function modalAddClient(){
  const ibs=STATE.inbounds;
  if(!ibs.length){toast('Buat inbound dulu','err');return;}
  openModal(`
    <div class="mhead"><h3>Tambah Client</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="field"><label>Inbound</label><select class="input" id="c_ib" onchange="addClientProtoChanged()">
        ${ibs.map(i=>`<option value="${i.id}">${esc(i.remark)} (${i.protocol}:${i.port})</option>`).join('')}</select></div>
      <div class="field"><label>Email / nama</label><input class="input" id="c_email" placeholder="budi"></div>
      <div id="c_cred_slot"></div>
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="c_gb" type="number" value="0"></div>
        <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="c_ip" type="number" value="0"></div>
      </div>
      <div class="field"><label>Kadaluarsa (tanggal &amp; jam)</label>
        <input class="input" id="c_exp" type="datetime-local" value="${toLocalInput(Date.now()+30*86400000)}">
        <div class="hint">Kosongkan = tanpa batas (∞). Default 30 hari dari sekarang.</div></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitClient()">Buat</button></div>`);
  addClientProtoChanged();
}
async function submitClient(){
  const ib=inboundById(ival('c_ib'));
  const kind=clientCredKind(ib.protocol);
  const client={email:ival('c_email').trim()};
  const cred=ival('c_cred').trim();
  if(cred){if(kind==='uuid')client.id=cred;else if(kind==='password')client.password=cred;}
  if(Number(ival('c_gb'))>0)client.totalGB=Math.round(Number(ival('c_gb'))*1024**3);
  const exp=fromLocalInput(ival('c_exp'));
  if(exp>0)client.expiryTime=exp;
  if(Number(ival('c_ip'))>0)client.limitIp=Number(ival('c_ip'));
  try{const c=await api('POST','/clients/add',{client,inboundIds:[Number(ival('c_ib'))]});
    toast('Client dibuat','ok');closeModal();refresh();
    setTimeout(()=>modalShare(c.email),300);
  }catch(x){toast(x.message,'err');}
}

function modalEditClient(email){
  const c=STATE.clients.find(x=>x.email===email);if(!c)return;
  const ib=inboundById(c.inboundIds&&c.inboundIds[0]);
  let kind=clientCredKind(ib.protocol);
  if(!ib.protocol)kind=c.password?'password':'uuid';   // fallback bila inbound tak ketemu
  const method=(ib.settings&&ib.settings.method)||'';
  const cred=kind==='uuid'?(c.id||''):(c.password||c.id||'');
  const gb=c.totalGB?(c.totalGB/1024**3).toFixed(2):0;
  const expVal=(c.expiryTime>0)?toLocalInput(c.expiryTime):'';
  const ibLabel=`${esc(ib.remark||('#'+(c.inboundIds&&c.inboundIds[0]||'')))} (${esc(ib.protocol||'?')}${ib.port?':'+ib.port:''})`;
  openModal(`
    <div class="mhead"><h3>Edit Client</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <div class="field"><label>Inbound</label><input class="input" value="${ibLabel}" readonly style="opacity:.65;cursor:not-allowed"></div>
      <div class="field"><label>Email / nama</label><input class="input" id="e_email" value="${esc(email)}"></div>
      ${credFieldHTML('e',kind,method,cred)}
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="e_gb" type="number" value="${gb}"></div>
        <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="e_ip" type="number" value="${c.limitIp||0}"></div>
      </div>
      <div class="field"><label>Kadaluarsa (tanggal &amp; jam)</label>
        <input class="input" id="e_exp" type="datetime-local" value="${expVal}">
        <div class="hint">Kosongkan = tanpa batas (∞).</div></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitEdit('${esc(email)}')">Simpan</button></div>`);
}
async function submitEdit(email){
  const c=STATE.clients.find(x=>x.email===email);
  const ib=inboundById(c.inboundIds&&c.inboundIds[0]);
  let kind=clientCredKind(ib.protocol);
  if(!ib.protocol)kind=c.password?'password':'uuid';
  const body={totalGB:Math.round(Number(ival('e_gb'))*1024**3),limitIp:Number(ival('e_ip'))};
  const newEmail=ival('e_email').trim();
  if(newEmail&&newEmail!==email)body.email=newEmail;
  if(kind!=='none'){
    const cred=ival('e_cred').trim();
    const cur=kind==='uuid'?(c.id||''):(c.password||c.id||'');
    if(cred&&cred!==cur){if(kind==='uuid')body.id=cred;else body.password=cred;}
  }
  const initExp=(c.expiryTime>0)?toLocalInput(c.expiryTime):'';
  const curExp=ival('e_exp').trim();
  if(curExp!==initExp)body.expiryTime=fromLocalInput(curExp);   // kosong -> 0 (∞)
  try{await api('POST','/clients/update/'+encodeURIComponent(email),body);toast('Tersimpan','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

async function modalShare(email){
  openModal(`<div class="mhead"><h3>Share — ${esc(email)}</h3><button class="close" onclick="closeModal()">×</button></div>
    <div class="mbody"><div class="linkbox" id="shr">Memuat…</div>
      <div class="qrwrap"><img id="shrqr" alt="QR"></div>
      <button class="btn primary block" style="margin-top:14px" onclick="copyLink()">Salin link</button></div>`);
  try{
    const o=await api('GET','/clients/link/'+encodeURIComponent(email));
    document.getElementById('shr').textContent=o.link;
    document.getElementById('shrqr').src=API+'/clients/qr/'+encodeURIComponent(email);
    window.__link=o.link;
  }catch(x){document.getElementById('shr').textContent=x.message;}
}
function copyLink(){navigator.clipboard.writeText(window.__link||'').then(()=>toast('Link disalin','ok'));}

// ---------- boot ----------
(async function(){
  try{await api('GET','/server/status');showApp();}catch(x){showLogin();}
})();
</script>
