// Isi ulang form dari inbound yang sudah ada (kebalikan dari buildProtoSettings/buildStream/applySecurity/buildSniffing).
function fillInboundForm(ib){
  const S=ib.settings||{}, ST=ib.streamSettings||{}, SN=ib.sniffing||{}, p=ib.protocol;
  const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=(v==null?'':v);};
  const sc=(id,b)=>{const e=document.getElementById(id);if(e)e.checked=!!b;};
  const join=(v,d)=>Array.isArray(v)?v.filter(x=>x!=='').join(','):(v!=null?v:(d||''));

  // ----- Umum -----
  sv('i_port', ib.port);
  sv('i_remark', ib.remark);
  sv('i_listen', ib.listen||'0.0.0.0');
  sv('i_addr', ib.shareAddr||'');
  sv('i_tag', ib.tag);
  sv('i_gb', ib.total?+(ib.total/1024**3).toFixed(2):0);
  const rem=daysLeft(ib.expiryTime);
  sv('i_days', (ib.expiryTime>0&&rem!=null)?Math.max(0,rem):0);

  // ----- Protokol-spesifik (settings) -----
  if(p==='shadowsocks') sv('i_ss_method', S.method);
  if(p==='wireguard'){ sv('i_wg_mtu', S.mtu||1420); sv('i_wg_secret', S.secretKey); }
  if(p==='socks'){ sv('i_socks_ip', S.ip||'127.0.0.1'); sc('i_socks_udp', S.udp!==false); }
  if(p==='dokodemo-door'){ sv('i_doko_addr', S.address||'127.0.0.1'); sv('i_doko_port', S.port||80);
    sv('i_doko_net', S.network||'tcp,udp'); sc('i_doko_redirect', S.followRedirect); }
  if(p==='hysteria'){
    const hy=ST.hysteriaSettings||{};
    if(hy.obfs&&hy.obfs.password) sv('i_hy_obfs', hy.obfs.password);
    if(hy.congestion){ sv('i_hy_up', hy.congestion.up_mbps||0); sv('i_hy_down', hy.congestion.down_mbps||0); }
  }

  // ----- Transport (network) -----
  const net=ST.network||'tcp';
  if(['tcp','kcp','ws','grpc','httpupgrade','xhttp'].indexOf(net)>=0) sv('i_net', net);
  if(net==='tcp'){
    const tcp=ST.tcpSettings||{}, ht=(tcp.header&&tcp.header.type)||'none';
    sv('i_tcp_header', ht);
    if(ht==='http'){ const req=tcp.header.request||{};
      sv('i_path', (req.path&&req.path[0])||'/');
      sv('i_path_host', join((req.headers&&req.headers.Host)));
    }
  } else if(net==='kcp'){
    const k=ST.kcpSettings||{};
    sv('i_kcp_mtu',k.mtu||1350); sv('i_kcp_tti',k.tti||50);
    sv('i_kcp_up',k.uplinkCapacity||5); sv('i_kcp_down',k.downlinkCapacity||20);
    sc('i_kcp_congestion',k.congestion); sv('i_kcp_header',(k.header&&k.header.type)||'none');
    sv('i_kcp_seed',k.seed);
  } else if(net==='ws'){
    const w=ST.wsSettings||{}; sv('i_ws_path',w.path||'/'); sv('i_ws_host',w.host);
    sv('i_ws_heartbeat',w.heartbeatPeriod||0);
  } else if(net==='grpc'){
    const g=ST.grpcSettings||{}; sv('i_grpc_service',g.serviceName); sv('i_grpc_authority',g.authority);
    sc('i_grpc_multi',g.multiMode);
  } else if(net==='httpupgrade'){
    const h=ST.httpupgradeSettings||{}; sv('i_hu_path',h.path||'/'); sv('i_hu_host',h.host);
  } else if(net==='xhttp'){
    const x=ST.xhttpSettings||{}; sv('i_xh_path',x.path||'/'); sv('i_xh_host',x.host); sv('i_xh_mode',x.mode||'auto');
  }

  // ----- Security (TLS / REALITY) -----
  // Field klien dibaca dari sub-key `settings` (3x-ui layout) dengan fallback
  // ke top-level untuk data lawas.
  const sec=ST.security||'none';
  sv('i_sec', sec);
  if(sec==='tls'){
    const t=ST.tlsSettings||{}, cert=(t.certificates&&t.certificates[0])||{};
    const tc=t.settings||{};  // field klien
    sv('i_sni',t.serverName);
    sv('i_alpn',join(t.alpn,'h2,http/1.1'));
    sv('i_tls_min',t.minVersion||'1.2'); sv('i_tls_max',t.maxVersion||'1.3');
    sv('i_tls_fp',tc.fingerprint||t.fingerprint||'chrome');
    sv('i_cert_file',cert.certificateFile); sv('i_key_file',cert.keyFile);
    sc('i_reject_sni',!!t.rejectUnknownSni);
    sc('i_disable_sysroot',!!t.disableSystemRoot);
    sc('i_session_resumption',!!t.enableSessionResumption);
    sv('i_cipher_suites',t.cipherSuites||'');
    sc('i_allow_insecure',!!(tc.allowInsecure!==undefined?tc.allowInsecure:t.allowInsecure));
    sv('i_vcn',tc.verifyPeerCertByName||'');
    sv('i_pcs',join(tc.pinnedPeerCertSha256||t.pinnedPeerCertSha256));
  } else if(sec==='reality'){
    const r=ST.realitySettings||{};
    const rc=r.settings||{};  // field klien
    sv('i_dest',r.dest||r.target||'yahoo.com:443');
    sv('i_server_names',join(r.serverNames));
    sv('i_priv_key',r.privateKey); sv('i_pub_key',rc.publicKey||r.publicKey);
    sv('i_short_ids',join(r.shortIds));
    sv('i_reality_fp',rc.fingerprint||r.fingerprint||'chrome'); sv('i_spider',rc.spiderX||r.spiderX||'/');
  }

  // ----- Sniffing -----
  const en=SN.enabled!==false;
  sc('i_sniff_en', en); ishow('i_sniff_opts', en);
  const ov=SN.destOverride||[];
  sc('i_sniff_http',ov.indexOf('http')>=0);
  sc('i_sniff_tls',ov.indexOf('tls')>=0);
  sc('i_sniff_quic',ov.indexOf('quic')>=0);
  sc('i_sniff_fakedns',ov.indexOf('fakedns')>=0);
  sc('i_sniff_meta',!!SN.metadataOnly);
  sc('i_sniff_route',!!SN.routeOnly);
  sv('i_sniff_ips_excl',join(SN.ipsExcluded));
  sv('i_sniff_domains_excl',join(SN.domainsExcluded));
}

function inbApplyProto(){
  const p=ival('i_proto');
  const hasStream=!['wireguard','dokodemo-door'].includes(p);
  const showTransport=hasStream && p!=='hysteria';
  // visibilitas tombol tab
  ishow('itabbtn_transport', showTransport);
  ishow('itabbtn_security', hasStream);
  // section per protokol
  ['vless','vmess','trojan','shadowsocks','hysteria','wireguard','socks','http','dokodemo-door']
    .forEach(x=>ishow('pfields_'+x, x===p));
  // hysteria: security dipaksa TLS
  const sec=document.getElementById('i_sec');
  if(sec){ if(p==='hysteria'){sec.value='tls';sec.disabled=true;} else {sec.disabled=false;} }
  // kembali ke tab Umum agar tak berdiri di tab yang tersembunyi
  inbTab('general');
  inbToggle();
}

function inbToggle(){
  const net=ival('i_net')||'tcp';
  ['tcp','kcp','ws','grpc','httpupgrade','xhttp'].forEach(n=>ishow('net_'+n, n===net || (n==='tcp'&&net==='raw')));
  ishow('tcp_http_fields', ival('i_tcp_header')==='http');
  const sec=ival('i_sec')||'none';
  ishow('sec_tls', sec==='tls');
  ishow('sec_reality', sec==='reality');
}

// ---- perakit JSON standar Xray-core ----
function buildProtoSettings(p){
  if(p==='vless')       return {clients:[],decryption:'none',fallbacks:[]};
  if(p==='vmess')       return {clients:[]};
  if(p==='trojan')      return {clients:[],fallbacks:[]};
  if(p==='shadowsocks') return {method:ival('i_ss_method')||'chacha20-ietf-poly1305',clients:[],network:'tcp,udp'};
  if(p==='hysteria')    return {version:2,clients:[]};
  if(p==='wireguard')   return {secretKey:ival('i_wg_secret').trim(),mtu:Number(ival('i_wg_mtu'))||1420,peers:[]};
  if(p==='socks')       return {auth:'password',accounts:[],udp:ick('i_socks_udp'),ip:ival('i_socks_ip')||'127.0.0.1'};
  if(p==='http')        return {accounts:[]};
  if(p==='dokodemo-door') return {address:ival('i_doko_addr')||'127.0.0.1',port:Number(ival('i_doko_port'))||80,network:ival('i_doko_net')||'tcp,udp',followRedirect:ick('i_doko_redirect')};
  return {};
}
function applySecurity(s,sec){
  if(sec==='tls'){
    const alpn=(ival('i_alpn')||'h2,http/1.1').split(',').map(x=>x.trim()).filter(Boolean);
    s.tlsSettings={
      serverName:ival('i_sni').trim(),
      minVersion:ival('i_tls_min')||'1.2',
      maxVersion:ival('i_tls_max')||'1.3',
      alpn,
      certificates:[{certificateFile:ival('i_cert_file').trim(),keyFile:ival('i_key_file').trim(),ocspStapling:3600}],
    };
    // Field server-side opsional untuk domain fronting / hardening
    if(ick('i_reject_sni')) s.tlsSettings.rejectUnknownSni=true;
    if(ick('i_disable_sysroot')) s.tlsSettings.disableSystemRoot=true;
    if(ick('i_session_resumption')) s.tlsSettings.enableSessionResumption=true;
    const cs=ival('i_cipher_suites').trim(); if(cs) s.tlsSettings.cipherSuites=cs;
    const vcn=ival('i_vcn').trim();
    // Field klien (uTLS/share-link) — ditempatkan di sub-key `settings`
    // (kompatibel 3x-ui). Dibuang backend sebelum tulis ke xray.
    s.tlsSettings.settings={
      fingerprint:ival('i_tls_fp')||'chrome',
    };
    if(ick('i_allow_insecure')) s.tlsSettings.settings.allowInsecure=true;
    if(vcn) s.tlsSettings.settings.verifyPeerCertByName=vcn;
    const pcs=ival('i_pcs').trim().split(',').map(x=>x.trim()).filter(Boolean);
    if(pcs.length) s.tlsSettings.settings.pinnedPeerCertSha256=pcs;
  } else if(sec==='reality'){
    const dest=ival('i_dest').trim()||'yahoo.com:443';
    const names=(ival('i_server_names').trim()||dest.split(':')[0]).split(',').map(x=>x.trim()).filter(Boolean);
    const sids=ival('i_short_ids').trim().split(',').map(x=>x.trim()).filter(Boolean);
    s.realitySettings={
      show:false, dest, xver:0, serverNames:names,
      privateKey:ival('i_priv_key').trim(), shortIds:sids,
      settings:{
        publicKey:ival('i_pub_key').trim(),
        fingerprint:ival('i_reality_fp')||'chrome',
        serverName:'',
        spiderX:ival('i_spider')||'/',
      },
    };
  }
}
function buildStream(net,sec){
  const nn=(net==='raw')?'tcp':net;
  const s={network:nn,security:sec};
  if(nn==='tcp'){
    const ht=ival('i_tcp_header')||'none';
    const tcp={acceptProxyProtocol:false,header:{type:ht}};
    if(ht==='http'){
      const host=ival('i_path_host').trim();
      tcp.header.request={version:'1.1',method:'GET',path:[ival('i_path').trim()||'/'],
        headers:{Host:host?host.split(',').map(x=>x.trim()):[''],Connection:['keep-alive'],'Accept-Encoding':['gzip, deflate']}};
    }
    s.tcpSettings=tcp;
  } else if(nn==='kcp'){
    s.kcpSettings={mtu:Number(ival('i_kcp_mtu'))||1350,tti:Number(ival('i_kcp_tti'))||50,
      uplinkCapacity:Number(ival('i_kcp_up'))||5,downlinkCapacity:Number(ival('i_kcp_down'))||20,
      congestion:ick('i_kcp_congestion'),readBufferSize:2,writeBufferSize:2,
      header:{type:ival('i_kcp_header')||'none'},seed:ival('i_kcp_seed').trim()};
  } else if(nn==='ws'){
    s.wsSettings={path:ival('i_ws_path')||'/',host:ival('i_ws_host').trim()};
    const hb=Number(ival('i_ws_heartbeat')); if(hb) s.wsSettings.heartbeatPeriod=hb;
  } else if(nn==='grpc'){
    s.grpcSettings={serviceName:(ival('i_grpc_service').trim()||'grpc'),authority:ival('i_grpc_authority').trim(),multiMode:ick('i_grpc_multi')};
  } else if(nn==='httpupgrade'){
    s.httpupgradeSettings={path:ival('i_hu_path')||'/',host:ival('i_hu_host').trim()};
  } else if(nn==='xhttp'){
    s.xhttpSettings={path:ival('i_xh_path')||'/',host:ival('i_xh_host').trim(),mode:ival('i_xh_mode')||'auto'};
  }
  applySecurity(s,sec);
  return s;
}
function buildHysteriaStream(){
  const s={network:'hysteria',security:'tls'};
  const hy={version:2,udpIdleTimeout:60};
  const obfs=ival('i_hy_obfs').trim();
  if(obfs) hy.obfs={type:'salamander',password:obfs};
  const up=Number(ival('i_hy_up')),down=Number(ival('i_hy_down'));
  if(up||down) hy.congestion={type:'bbr',up_mbps:up||0,down_mbps:down||0};
  s.hysteriaSettings=hy;
  s.tlsSettings={serverName:ival('i_sni').trim(),alpn:['h3'],minVersion:'1.2',maxVersion:'1.3',
    certificates:[{certificateFile:ival('i_cert_file').trim(),keyFile:ival('i_key_file').trim(),ocspStapling:3600}],
    settings:{fingerprint:ival('i_tls_fp')||'chrome'}};
  if(ick('i_allow_insecure')) s.tlsSettings.settings.allowInsecure=true;
  return s;
}
function buildSniffing(){
  if(!ick('i_sniff_en')) return {enabled:false};
  const ov=[];
  if(ick('i_sniff_http'))ov.push('http');
  if(ick('i_sniff_tls'))ov.push('tls');
  if(ick('i_sniff_quic'))ov.push('quic');
  if(ick('i_sniff_fakedns'))ov.push('fakedns');
  const sn={enabled:true,destOverride:ov,metadataOnly:ick('i_sniff_meta'),routeOnly:ick('i_sniff_route')};
  const dom=ival('i_sniff_domains_excl').trim().split(',').map(x=>x.trim()).filter(Boolean);
  const ips=ival('i_sniff_ips_excl').trim().split(',').map(x=>x.trim()).filter(Boolean);
  if(dom.length) sn.domainsExcluded=dom;
  if(ips.length) sn.ipsExcluded=ips;
  return sn;
}

async function submitInbound(){
  const p=ival('i_proto');
  const port=Number(ival('i_port'));
  if(!port){toast('Port wajib diisi','err');inbTab('general');return;}
  const listen=ival('i_listen').trim()||'0.0.0.0';
  const remark=ival('i_remark').trim();
  const hasStream=!['wireguard','dokodemo-door'].includes(p);

  let settings=buildProtoSettings(p);
  let streamSettings={};
  if(hasStream) streamSettings=(p==='hysteria')?buildHysteriaStream():buildStream(ival('i_net'),ival('i_sec'));
  let sniffing=buildSniffing();

  // Validasi kelengkapan TLS/Hysteria
  const needCert=(p==='hysteria')||(hasStream&&ival('i_sec')==='tls');
  if(needCert && !ival('i_cert_file').trim()){
    toast('TLS butuh certificate & key file. Pilih sertifikat atau isi path di tab TLS/Reality.','err');inbTab('security');return;
  }

  // Override via Custom JSON bila diisi
  try{
    const sj=ival('i_settings_json').trim(); if(sj) settings=JSON.parse(sj);
    const stj=ival('i_stream_json').trim(); if(stj) streamSettings=JSON.parse(stj);
    const snj=ival('i_sniffing_json').trim(); if(snj) sniffing=JSON.parse(snj);
  }catch(x){toast('JSON custom tidak valid: '+x.message,'err');inbTab('json');return;}

  // Edit inbound yang sudah ada — protokol & tag tak diubah.
  if(EDIT_INBOUND_ID){
    const upd={remark,listen,port,
      settings:JSON.stringify(settings),
      streamSettings:JSON.stringify(streamSettings),
      sniffing:JSON.stringify(sniffing),
      shareAddr:ival('i_addr').trim(),
      total:Number(ival('i_gb'))>0?Math.round(Number(ival('i_gb'))*1024**3):0,
      expiryTime:Number(ival('i_days'))>0?Date.now()+Number(ival('i_days'))*86400000:0};
    try{await api('POST','/inbounds/update/'+EDIT_INBOUND_ID,upd);toast('Inbound diperbarui','ok');closeModal();refresh();}
    catch(x){toast(x.message,'err');}
    return;
  }

  const body={protocol:p,port,listen,remark,
    settings:JSON.stringify(settings),
    streamSettings:JSON.stringify(streamSettings),
    sniffing:JSON.stringify(sniffing),
    shareAddr:ival('i_addr').trim()};
  const tag=ival('i_tag').trim(); if(tag) body.tag=tag;
  if(Number(ival('i_gb'))>0) body.total=Math.round(Number(ival('i_gb'))*1024**3);
  if(Number(ival('i_days'))>0) body.expiryTime=Date.now()+Number(ival('i_days'))*86400000;

  try{await api('POST','/inbounds/add',body);toast('Inbound dibuat','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

// ---- kredensial client: UUID (vless/vmess) atau Password (trojan/ss/socks/http/hysteria) ala 3x-ui ----
function inboundById(id){return STATE.inbounds.find(i=>String(i.id)===String(id))||{};}
function clientCredKind(protocol){
  if(protocol==='vless'||protocol==='vmess')return 'uuid';
  if(protocol==='wireguard')return 'none';           // keypair dibuat otomatis di server
  return 'password';                                 // trojan, shadowsocks, socks, http, hysteria
}
function credHint(kind,method){
  if(kind==='uuid')return 'ID unik untuk VLESS/VMess. Kosongkan untuk dibuat otomatis.';
  if(String(method).indexOf('2022-blake3-')===0)return 'Password Shadowsocks 2022 (key base64). Kosongkan untuk dibuat otomatis.';
  return 'Password client. Kosongkan untuk dibuat otomatis.';
}
function credFieldHTML(p,kind,method,value){
  if(kind==='none')return '';
  const label=kind==='uuid'?'UUID':'Password';
  return `<div class="field" id="${p}_cred_wrap"><label id="${p}_cred_label">${label}</label>
    <div class="withbtn"><input class="input" id="${p}_cred" data-kind="${kind}" data-method="${esc(method||'')}" value="${esc(value||'')}" placeholder="auto jika kosong">
      <button type="button" class="btn gen" onclick="genClientCred('${p}')">${icon('key','sm')} Generate</button></div>
    <div class="hint" id="${p}_cred_hint">${credHint(kind,method)}</div></div>`;
}
async function genClientCred(p){
  const inp=document.getElementById(p+'_cred');if(!inp)return;
  const kind=inp.dataset.kind||'uuid';
  try{
    let path='/keygen/uuid',key='uuid';
    if(kind==='password'){
      const m=inp.dataset.method||'';key='password';
      path=(m.indexOf('2022-blake3-')===0)?'/keygen/ss2022?method='+encodeURIComponent(m):'/keygen/password';
    }
    const o=await api('GET',path);
    if(o&&o[key]!=null)inp.value=o[key];
  }catch(x){toast(x.message,'err');}
}
// Rebuild kolom kredensial saat inbound (protokol) di form Tambah berubah.
function addClientProtoChanged(){
  const slot=document.getElementById('c_cred_slot');if(!slot)return;
  const ib=inboundById(ival('c_ib'));
  const kind=clientCredKind(ib.protocol);
  const method=(ib.settings&&ib.settings.method)||'';
  const prev=document.getElementById('c_cred');
  const prevKind=prev?prev.dataset.kind:'';
  const keepVal=(prev&&prevKind===kind)?prev.value:'';   // pertahankan nilai bila jenisnya sama
  slot.innerHTML=credFieldHTML('c',kind,method,keepVal);
  if(kind!=='none'&&prevKind!==kind&&!keepVal.trim())genClientCred('c'); // auto-isi saat pertama/ganti jenis
}

// Konversi epoch(ms) <-> nilai input datetime-local (waktu lokal browser).
function toLocalInput(ms){
  const d=new Date(Number(ms)||Date.now());
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());
}
function fromLocalInput(v){
  v=(v||'').trim(); if(!v)return 0;
  const t=new Date(v).getTime();
  return isNaN(t)?0:t;
}

function modalAddClient(){
  const ibs=STATE.inbounds;
  if(!ibs.length){toast('Buat inbound dulu','err');return;}
  openModal(`
    <div class="mhead"><h3>Tambah Client</h3><button class="close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="mbody">
      <div class="field"><label>Inbound</label><select class="input" id="c_ib" onchange="addClientProtoChanged()">
        ${ibs.map(i=>`<option value="${i.id}">${esc(i.remark)} (${i.protocol}:${i.port})</option>`).join('')}</select></div>
      <div class="field"><label>Email / nama</label><input class="input" id="c_email" placeholder="budi"></div>
      <div id="c_cred_slot"></div>
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="c_gb" type="number" value="0"></div>
        <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="c_ip" type="number" value="0"></div>
      </div>
      <div class="field"><label>Kadaluarsa (tanggal &amp; jam)</label>
        <input class="input" id="c_exp" type="datetime-local" value="${toLocalInput(Date.now()+30*86400000)}">
        <div class="hint">Kosongkan = tanpa batas (∞). Default 30 hari dari sekarang.</div></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitClient()">${icon('plus','sm')} Buat</button></div>`);
  addClientProtoChanged();
}
async function submitClient(){
  const ib=inboundById(ival('c_ib'));
  const kind=clientCredKind(ib.protocol);
  const client={email:ival('c_email').trim()};
  const cred=ival('c_cred').trim();
  if(cred){if(kind==='uuid')client.id=cred;else if(kind==='password')client.password=cred;}
  if(Number(ival('c_gb'))>0)client.totalGB=Math.round(Number(ival('c_gb'))*1024**3);
  const exp=fromLocalInput(ival('c_exp'));
  if(exp>0)client.expiryTime=exp;
  if(Number(ival('c_ip'))>0)client.limitIp=Number(ival('c_ip'));
  try{const c=await api('POST','/clients/add',{client,inboundIds:[Number(ival('c_ib'))]});
    toast('Client dibuat','ok');closeModal();refresh();
    setTimeout(()=>modalShare(c.email),300);
  }catch(x){toast(x.message,'err');}
}

function modalEditClient(email){
  const c=STATE.clients.find(x=>x.email===email);if(!c)return;
  const ib=inboundById(c.inboundIds&&c.inboundIds[0]);
  let kind=clientCredKind(ib.protocol);
  if(!ib.protocol)kind=c.password?'password':'uuid';   // fallback bila inbound tak ketemu
  const method=(ib.settings&&ib.settings.method)||'';
  const cred=kind==='uuid'?(c.id||''):(c.password||c.id||'');
  const gb=c.totalGB?(c.totalGB/1024**3).toFixed(2):0;
  const expVal=(c.expiryTime>0)?toLocalInput(c.expiryTime):'';
  const ibLabel=`${esc(ib.remark||('#'+(c.inboundIds&&c.inboundIds[0]||'')))} (${esc(ib.protocol||'?')}${ib.port?':'+ib.port:''})`;
  openModal(`
    <div class="mhead"><h3>Edit Client</h3><button class="close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="mbody">
      <div class="field"><label>Inbound</label><input class="input" value="${ibLabel}" readonly style="opacity:.65;cursor:not-allowed"></div>
      <div class="field"><label>Email / nama</label><input class="input" id="e_email" value="${esc(email)}"></div>
      ${credFieldHTML('e',kind,method,cred)}
      <div class="row2">
        <div class="field"><label>Kuota (GB, 0=∞)</label><input class="input" id="e_gb" type="number" value="${gb}"></div>
        <div class="field"><label>Limit IP (0=∞)</label><input class="input" id="e_ip" type="number" value="${c.limitIp||0}"></div>
      </div>
      <div class="field"><label>Kadaluarsa (tanggal &amp; jam)</label>
        <input class="input" id="e_exp" type="datetime-local" value="${expVal}">
        <div class="hint">Kosongkan = tanpa batas (∞).</div></div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="submitEdit('${esc(email)}')">Simpan</button></div>`);
}
async function submitEdit(email){
  const c=STATE.clients.find(x=>x.email===email);
  const ib=inboundById(c.inboundIds&&c.inboundIds[0]);
  let kind=clientCredKind(ib.protocol);
  if(!ib.protocol)kind=c.password?'password':'uuid';
  const body={totalGB:Math.round(Number(ival('e_gb'))*1024**3),limitIp:Number(ival('e_ip'))};
  const newEmail=ival('e_email').trim();
  if(newEmail&&newEmail!==email)body.email=newEmail;
  if(kind!=='none'){
    const cred=ival('e_cred').trim();
    const cur=kind==='uuid'?(c.id||''):(c.password||c.id||'');
    if(cred&&cred!==cur){if(kind==='uuid')body.id=cred;else body.password=cred;}
  }
  const initExp=(c.expiryTime>0)?toLocalInput(c.expiryTime):'';
  const curExp=ival('e_exp').trim();
  if(curExp!==initExp)body.expiryTime=fromLocalInput(curExp);   // kosong -> 0 (∞)
  try{await api('POST','/clients/update/'+encodeURIComponent(email),body);toast('Tersimpan','ok');closeModal();refresh();}
  catch(x){toast(x.message,'err');}
}

async function modalShare(email){
  openModal(`<div class="mhead"><h3>${icon('share','sm')} Share — ${esc(email)}</h3><button class="close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="mbody"><div class="linkbox" id="shr">Memuat…</div>
      <div class="qrwrap"><img id="shrqr" alt="QR"></div>
      <button class="btn primary block" style="margin-top:14px" onclick="copyLink()">${icon('copy','sm')} Salin link</button></div>`);
  try{
    const o=await api('GET','/clients/link/'+encodeURIComponent(email));
    document.getElementById('shr').textContent=o.link;
    document.getElementById('shrqr').src=API+'/clients/qr/'+encodeURIComponent(email);
    window.__link=o.link;
  }catch(x){document.getElementById('shr').textContent=x.message;}
}
function copyLink(){navigator.clipboard.writeText(window.__link||'').then(()=>toast('Link disalin','ok'));}

// ---------- boot ----------
(async function(){
  injectFixedIcons();      // inject SVG ke logo, tombol login, theme icon
  renderIcons(document);   // replace semua [data-icon] di HTML shell
  try{await api('GET','/server/status');showApp();}catch(x){showLogin();}
})();
</script>
