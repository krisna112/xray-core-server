# Fail2ban filter untuk pelanggaran limit IP per-client xray-manager
# Format log (sama dengan 3x-ui):
# 2026/07/08 10:00:00 [LIMIT_IP] Email = budi || SRC = 1.2.3.4

[Definition]
datepattern = ^%%Y/%%m/%%d %%H:%%M:%%S
failregex = \[LIMIT_IP\]\s*Email\s*=\s*<F-USER>.+</F-USER>\s*\|\|\s*SRC\s*=\s*<ADDR>
ignoreregex =
